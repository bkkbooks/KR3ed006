body:
  text: 卷第六要方第六卷所治如下治冬月傷寒諸方治春夏溫熱病諸方治秋月中冷瘧病諸方上三件治冬月傷寒諸方論曰古今相傳稱傷寒為難治之病天行溫疫是毒病之氣而論治者不別傷寒與天行溫疫為異氣耳云傷寒是雅士之辭雲天行溫疫是田舍間號耳不說病之異同也考之衆經其實殊矣所宜不同方說宜辨是以略述其要焉陰陽大論云春氣溫和夏氣暑熱秋氣清涼冬氣冰冽此則四時正氣之序也冬時嚴寒萬類深藏君子周密則不傷於寒觸冒之者乃名傷寒耳其傷於四時之氣皆能為病以傷寒為毒者以其最成殺癘之氣也中而即病者名曰傷寒不即病者寒毒藏於肌膚中至春變為溫病至夏變為暑病暑病者熱極重於溫也是以辛苦之人春夏多溫熱病者皆由冬時觸冒寒冷之所致非時行之氣也凡時行者春時應暖而反大寒夏時應熱而反大冷秋時應涼反而大熱冬時應寒而反大溫此非其時而有其氣是以一歲之中長幼之病多相似者此則時行之氣也王叔和曰傷寒之病逐日淺深以施方治今世人得傷寒或始不早治或治不對病或日數久淹困乃告醫醫又不知次第而治之則不中病皆以臨時消息制方無不效也今搜採仲景舊論録其證候診脈聲色對病真方有神驗者擬防世急也又土地高下寒溫不同物性剛柔餐居亦異是故黃帝興四方之問岐伯舉四治之能以訓後賢開其未悟臨病之工宜須兩審也陳廩丘云或問得病連服湯藥發汗汗不出如之何答曰醫經云連發汗汗不出者死吾思可蒸之如蒸中風法蒸濕之氣於外迎之不得不汗出也後以問張苗苗云曾有人作事疲極汗出臥單簟中冷得病但苦寒蜷諸醫與丸散湯四日之內凡八發汗汗不出苗令燒地布桃葉蒸之即得大汗於被中就粉敷身極燥乃起便愈後數以此發汗汗皆出也人性自有難使汗出者非但病使其然蒸之無不汗出也詔書發汗白薇散治傷寒二日不解方白薇二兩麻黃七分去節杏仁去皮尖熬貝母各三分上四味搗散酒服方寸七自覆臥汗出則愈雞子湯治發汗後二三日不解頭痛肉熱方麻黃一兩去節甘草一分炙上二味切以水二升扣雞子白令置於水內合和令勻納藥復攪令和上火煎之勿動煎至一升適寒溫頓服之蓋覆汗出粉敷之有效忌海藻菘菜葛根湯治病三四日不瘥身體毒熱方葛根八兩生薑三兩龍膽大青各半兩桂心甘草炙麻黃去節各二兩葳蕤芍藥黃芩石膏碎升麻各一兩上十二味切以水一斗先煮葛根麻黃取八升掠去沫然納余藥煮取三升分三服日二夜一服忌海藻菘菜生蔥治傷寒六七日其人大下寸脈沉遲手足厥逆下部脈不至咽喉痛不利唾膿血泄利不止者麻黃升麻湯方麻黃二兩半去節升麻五分當歸五分知母葳蕤一作菖蒲黃芩各三分麥門冬去心一作天門冬桂心芍藥乾薑石膏碎甘草炙茯苓白朮各一分上十四味切以水一斗先煮麻黃減二升掠去上沫納諸藥煮取三升去滓溫分三服相去如炊三斗米頃令盡汗出便愈忌海藻菘菜生蔥醋桃李雀肉等治傷寒七八日內實瘀熱結身黃如橘小便不利腹微脹滿茵陳湯下之方茵陳六兩梔子十四枚大黃三兩石膏一斤上四味㕮咀以水一斗二升煮茵陳得五升去滓納梔子大黃煎取三升分服一升日三小便當利如皂莢沫狀色正赤當腹減黃悉隨小便去也葳蕤湯治冬溫及春月中風傷寒則發熱頭眩痛喉咽干舌強胸內疼心胸痞滿腰背強方葳蕤二兩石膏三分末綿裹白薇二兩麻黃二兩去節獨活二兩杏仁二兩去皮尖兩仁芎藭二兩甘草二兩炙青木香二兩無可用麝香一分代之上九味切以水八升煮取三升分三服取汗若一寒一熱者加朴硝一分及大黃三兩下之忌海藻菘菜茅根橘皮湯治春夏天行傷寒胃冷變啘方白茅根切一升橘皮三兩桂心二兩切上三味切以水六升煮取三升去滓溫分三服數數服之盡復合之啘止乃停取微汗有熱減桂心一兩忌生蔥芍藥地黃湯治傷寒及溫病應發汗而不發之內瘀有蓄血者及鼻衄吐血不盡內余瘀血面黃大便黑者此主消化瘀血方芍藥三兩生地黃半斤牡丹二兩犀角一兩屑上四味切以水九升煮取三升分三服其人喜忘如狂者加地黃三兩黃芩三兩其人脈大來遲腹不滿自言滿者為無熱但依方服不須黃芩也忌蕪荑胡荽治傷寒鼻衄不止茅花湯主之方茅花一大把上以水八升煮取三升分三服即瘥若無茅花取茅根代之亦可治傷寒身熱衄血嘔逆麥門冬湯主之方麥門冬石膏寒水石各三兩甘草二兩桂心一兩上五味切以水一斗煮取三升分三服服桂枝湯大汗後煩渴熱不解脈洪大者屬白虎加人參湯方知母六兩甘草二兩炙石膏一升碎綿裹人參二兩粳米一升上五味切以水一斗二升煮米熟去米納諸藥煮取六升去滓溫服一升日三忌海藻菘菜射干湯主春冬傷寒秋夏中冷咳嗽曲拘不得氣息喉嗚啞失聲干嗽無唾喉中如哽者方射干二兩半夏五兩洗杏仁二兩去皮尖兩仁乾薑二兩炮甘草二兩炙紫菀二兩肉桂二兩吳茱萸二兩當歸二兩橘皮二兩麻黃二兩去節獨活二兩上十二味切以水一斗煮取三升去滓溫分三服始病一二日者可服此湯汗後重服勿汗也病久者初服可用大黃二兩初秋夏月暴雨冷及天行暴寒熱喜伏於內宜生薑四兩代乾薑除茱萸用枳實二兩炙忌羊肉海藻菘菜餳生蔥漏蘆連翹湯治傷寒熱毒變作赤色癰疽丹疹腫毒及眼赤痛生障翳悉主之方兼治天行漏蘆二兩連翹二兩黃芩二兩麻黃去節二兩白蘞二兩升麻二兩甘草二兩炙大黃二兩切枳實三兩炙上九味切以水九升煮取三升去滓溫分三服相去二食頃更服熱盛者可加芒硝二兩忌海藻菘菜等物秦皮湯治毒病沖眼忽生赤翳或白或腫膚起或赤痛不得視光痛入心肝或眼外浮腫如吹汁出生膜覆珠子方秦皮二兩前胡二兩常山二兩黃芩二兩升麻二兩芍藥二兩白薇二兩枳實二兩炙大黃三兩甘草二兩炙上十味以水八升煮取三升分三服相去二食頃更服若盛熱者可加芒硝二兩忌海藻菘菜生蔥生菜犀角湯治熱毒下黃赤汁及赤如腐爛血及赤滯如魚腦腹痛壯熱諸藥無效方黃柏一兩半黃芩一兩半白頭翁一兩黃連二兩當歸一兩牡蠣一兩半熬犀角屑半兩艾葉半兩石榴皮一兩半桑寄生一兩甘草一兩炙上十一味切以水八升煮取三升分三服忌豬肉冷水海藻菘菜治濕熱為毒及太陽傷寒外熱內虛熱攻腸胃下黃赤汁及如爛肉汁及赤滯壯熱腸痛者諸熱毒下良方梔子十四枚豉一升薤白一虎口凡三物切以水四升煮梔子薤白令熟納豉煎取二升半分三服麥奴丸治傷寒五六日以上不解熱在胸中口噤不能言唯欲飲水為敗傷寒醫所不治方麻黃去節大黃芒硝灶突中墨黃芩各二分麥奴梁上塵斧底黑各一分上八味搗篩蜜和如彈丸以新汲水五合研一丸病者渴欲飲水但極飲冷水不節升數須叟當寒寒訖汗出則愈若日移五丈不汗依前法服一丸以微利止藥勢盡乃食當冷食以除藥勢一名黑奴丸小麥黑勃名為麥奴是也陽毒湯治傷寒一二日便成陽毒或服藥吐下之後變成陽毒身重腰背痛煩悶不安狂言或走或見神鬼或吐血下利其脈浮大數面赤斑斑如錦紋喉咽痛唾膿血五日可治至七日不可治也宜服升麻湯方升麻二分當歸二分蜀椒汗一分雄黃研梔子桂心各一分甘草二分炙鱉甲大如手一片炙上八味切以水五升煮取二升半分三服如人行五里久再服溫覆手足毒出則汗汗出則解不解重作服亦取得吐佳陰毒去雄黃忌海藻菘菜生蔥莧菜陰毒湯治傷寒初病一二日便結成陰毒或服湯藥六七日以上至十日變成陰毒身重背強腹中絞痛喉咽不利毒氣攻心心下堅強短氣不得息嘔逆唇青面黑四肢厥冷其脈沉細緊數仲景云此陰毒之候身如被打五六日可治至七日不可治宜服甘草湯方甘草炙升麻當歸各二分蜀椒一分出汗鱉甲大如手一片炙上五味切以水五升煮取二升半分再服如人行五里頃復服溫覆當出汗汗出則愈若不得汗則不解當重服令汗出忌海藻菘菜莧菜青葙子散治熱病有䘌下部生瘡方青葙一兩雚蘆四兩狼牙三分橘皮二分萹蓄二分切之上五味搗下篩粥飲和合服兩錢匕日三不知稍增之治食勞復方葛根五兩以水五升煮取二升冷分三服治百合之病諸藥不能治若得藥則劇而吐痢如有神靈所加也身體仍和脈微數每尿時輒頭痛六十日乃愈尿頭不痛淅淅然者四十日愈尿快然但頭眩者二十日愈其證或未病而預見或病四五日而出或病二十日一月日復見者悉治之發汗已更發者百合知母湯主之方百合七枚擘知母三兩上二味以泉水洗先漬百合經一宿上當白沫瀉卻其汁更以好泉水二升煮取一升去滓置之一處別以泉水二升煮知母取一升去滓二味汁相和煮取一升半分溫再服之下之已更發者百合滑石代赭湯主之方百合七枚擘以泉水漬一宿上當白沫出去之滑石三兩碎代赭如彈丸一枚碎上三味先以泉水二升煮百合取一升去滓置一廂又以泉水二升煮和二味取一升去滓合煎取一升半分再服吐之已更發者百合雞子湯主之方百合七枚上一味依前法泉水二升煮取一升去滓扣雞子一枚取中黃納百合湯中攪令調溫再服之不吐不下不發汗病形如初百合生地黃湯主之方百合七枚上一味依前法漬以泉水二升煮取一升出地黃汁一升二味汁相和煮取一升半溫分再服一服中病者更勿服也大便當出惡沫凡百合病見於陰而以陽法攻之其陰不得解也復發其汗此為逆其病難治見於陽而以陰法攻之其陽不得解也復下之其病不愈百合病經一月不解變成渴者方百合根切一升上一味以水一斗漬之一宿以汁洗病人身也洗身訖食白湯餅勿與鹽豉也渴不瘥可用栝蔞根並牡蠣等份為散飲服方寸匕日三服百合病變腹中滿痛者方但取百合根隨多少熬令色黃末飲服之方寸匕日三滿消痛止治百合病變熱者方百合一兩滑石三兩為末飲服方寸匕微利乃良治狐惑薰草黃連湯方黃連四兩去皮薰草四兩上二味切以白漿一斗漬之一宿煮取二升去滓分為二服忌豬肉冷水其人脈數無熱微煩默默但欲臥汗出得之三四日眼赤如鳩眼者得之七八日其四眥黃黑能食者膿已成也治之方以赤小豆三升漬之令生牙足復干之加當歸三兩末漿水服方寸匕日三治春夏溫熱病諸方茅根湯治溫病有熱飲水暴冷啘者方茅根葛根各切半升上二味以水四升煮取二升稍溫飲之啘止則停治溫病熱未除重被暴寒寒毒入胃熱蘊結不散變啘者方單煮梓皮稍稍飲之佳溫病積飲冷冷結胃中熱入腎中變壯熱大啘者服梓皮溫啘得止也夫腎中有熱者病瘥後足心皮喜剝脫去頭髮禿落是其證也茅根橘皮湯治春夏天行寒毒傷於胃胃冷變啘方白茅根切一升橘皮三兩桂心二兩葛根二兩上四味切以水六升煮取三升分溫服三合數連服之盡復合啘止乃停耳微有熱減桂一兩知母解肌湯治溫熱病頭痛骨肉煩疼口燥心悶者或是夏月天行毒外寒內熱者或已下之餘熱未盡者或熱病自得痢有虛熱煩渴者方麻黃二兩去節知母三兩葛根三兩石膏三兩碎裹甘草二兩炙上五味切以水七升煮取三升分為三服若已下及自得下虛熱未歇者除麻黃加知母葛根病熱未除因夢泄者可除麻黃加白薇人參各二兩則止忌海藻菘菜葛根橘皮湯治冬溫未即病至春被積寒所折不得發至夏得熱其春寒解冬溫毒始發出肌中斑爛癮疹如錦紋而咳心悶嘔但吐清汁宜服此湯則靜方葛根二兩橘皮二兩杏仁二兩去尖皮及兩仁麻黃二兩去節知母二兩黃芩二兩甘草二兩炙上七味切以水七升煮取三升分溫三服嘔悶吐當先定便且消息忌海藻菘菜治溫毒發斑赤斑者五死一生黑斑者十死一生大疫難救黑奴丸方麻黃三兩去節大黃二兩芒硝一兩別下黃芩一兩釜底墨一兩研入灶尾墨一兩研入屋梁上塵二兩研入上七味搗末用蜜和如彈子大新汲水五合研一丸服之若渴但與水須臾當寒寒訖便汗則解日移五丈不覺更服一丸此治六日胸中常大熱口噤名壞病醫所不治服此丸多瘥治天行若已五六日不解頭痛壯熱四肢煩疼不得飲食大黃湯方大黃半兩黃連半兩去毛黃柏半兩梔子半兩擘上四味切以水八升煮取六七沸納豉一升蔥白七莖煮取三升分三服此許推然方神良又治傷寒已五六日頭痛壯熱四肢煩疼取汗並宜老小忌豬肉冷水正朝屠蘇酒法令人不病溫疫大黃五分川椒五分術桂各三分桔梗四分烏頭一分菝葜二分七物細切以綃囊貯之十二月晦日正中時懸置井中至泥正曉拜慶前出之正旦取藥置酒中屠蘇飲之於東向藥置井中能迎歲可世無此病此華他法武帝有方驗中從小至大少隨所堪一人飲一家無患飲藥三朝一方有防風一兩屠蘇酒此華他方也元旦飲之闢疫癘一切不正之氣造法用赤朮桂心七錢五分防風一兩菝葜五錢蜀椒桔梗大黃五錢七分烏頭二錢五分赤小豆十四枚以三角絳囊盛之除夜懸井底元旦取出置酒中煎數沸舉家東向從少至長次第飲之藥滓還投井中歲飲此水一世無病治秋月中冷瘧病諸方治山瘴瘧陵鯉甲湯南方山嶺溪源瘴氣毒作寒熱發作無時痿黃腫滿四肢痹弱皆山毒所為也並主之方陵鯉甲十片炙烏賊魚骨去甲鱉甲炙各一兩常山三兩附子一枚炮上五味切以酒三升漬之一夕先瘧發前稍稍服之勿絶藥味兼以塗身體斷雜人勿食飲過時乃得通人進飲食忌莧菜生蔥生菜豬肉常山湯治痎瘧先寒戰動地寒解壯熱日日發及間日發並斷方鱉甲一兩炙淡竹葉切三升洗常山三兩甘草炙三兩久酒三升上五味切以酒漬藥刀置上覆頭安露地明旦以水七升煮取三升分五服比未發前令盡當吐吐極傷多不必盡劑但斷人禁飲食得吐過時乃佳忌人莧海藻菘菜生蔥生菜治瘧雞子常山丸方取雞子一枚斷開頭出黃及白令盡置小鐺子中又取常山細末量滿前空殼又傾鐺子中又量白蜜還令滿殼復傾鐺子中三味同攪微火煎之勿停手微冷可丸則停丸如梧子如病人午時發己時服三十丸欲至發時又服三十丸用飲汁下欲吐任吐亦如前服訖更不發者不須服服後禁脂膩油麵生菜瓜果七日竹葉常山湯治溫瘧壯熱微寒溫瘧之候也壯熱後如覺微寒或疸瘧依時手足冷少時便壯熱亦有手足煩熱乾嘔者痎瘧先大寒後大熱者並主之神效尤宜乳下小兒亦瘥方常山三兩切淡竹葉一握小麥一升上三味以水五斗漬一宿明旦煮取二升溫分三服忌生蔥生菜
