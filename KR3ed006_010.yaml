body:
  text: 卷第十要方第十卷所治如下治哽誤吞物諸方治誤為火湯熱膏所傷諸方治熱暍諸方治溺水未死諸方治入井冢鬱冒諸方治自經未死諸方治服毒藥吞金未死諸方治射公毒諸方治丹疹毒腫諸方治瘭疽諸方治代指似瘭疽諸方治風熱毒腫熱瘡諸方治洪燭瘡諸方治蛷蝮尿生瘡諸方治釘毒瘡瘑疥癬惡瘡諸方治惡核惡肉惡脈諸方治氣腫氣痛諸方治緩疽諸方治附骨疽與賊風相似諸方治䐔病似疽諸方治癰癤瘻諸方治乳癰妒乳生瘡諸方治耳眼鼻口齒諸方治癭病諸方治瘰癧諸方治頽脫肛痔下部諸疾衆方治狐臭諸方治手足腋下股恆濕諸方治身㾦癗有氣口瘡諸方治面㾴疱瘡瘢諸方治面皯𪒟黑痣諸方治白癜赤疵諸方治蟲獸狗馬毒諸方治被壓迮墮捥折斫刺金瘡諸方上三十四件治哽誤吞物諸方治諸鯁方豬膏如雞子大吞之不瘥復吞不過再三便去又方取薤白湯煮半熟小嚼之令柔以繫繩系中央提繩置即吞薤白下喉牽出鯁即隨出也又方取虎骨燒作屑溫白飲服方寸匕良若無骨可用虎牙齒亦佳治諸哽方作竹篾刮令滑綿纏納咽中令至哽處可進退引之哽即出治魚骨哽在喉中衆法不能去者方取飴糖丸如雞子黃大吞之不去又吞亦漸大作丸比用得效也治魚骨哽方含水獺骨立出又方魚網覆頭立下治鯁魚骨橫喉中六七日不出方鯉魚鱗皮合燒作屑以水服即出治吞錢留咽中者方取白灰搗下篩溫白飲服方寸匕即下去又方艾蒿五兩細銼水五升煮取一升頓服便下治誤吞錢方搗火炭末服方寸匕則出治吞銀鈈及叉者方取白糖二斤漸食盡即出又方取水銀一兩分三服銀鈈便下去又方以胡粉一兩和水銀一兩冶調分再服水銀能消金銀治誤咽針方取精吸針磁石末溫白飲服一方寸匕解曰磁石特能吸取針難云含吞針哽在喉中而服磁石末入腹耶若含磁石口中者或吸針出耳二理詳取其義焉治食中吞髮結喉不出方取梳頭髮燒服一錢匕治誤為火湯熱膏所傷諸方治卒被火燒苦劇悶絶不識人方取新熱小便飲一升及冷水和蜜飲之口噤不開者可拗開灌之其悶瘥然後治外乃善治卒被火燒苦劇悶絶不識人方冷水解蜜飲之噤痙挾口與之又梔子膏方梔子三十枚白蘞五兩黃芩五兩三物㕮咀以水五升麻油一升合煎令水氣竭去滓冷之以淋瘡火熱毒則去肌皮得寬治火燒成瘡方白糖燒灰粉之即燥易瘥治熱暍諸方夏月中熱暍死凡中暍死不可使得冷得冷便死治之方以屈革帶繞暍人臍使三四人尿其中令溫亦可用泥土屈草亦可扣瓦碗底若脫車釭以著暍人臍上取令尿不得流去而已此謂道路窮急無湯當令人尿其中仲景云欲使多人尿取令溫若有湯便可與之仲景云不用泥及車釭恐此物冷暍即在夏月得熱土泥暖車釭亦可用也治中熱暍方取路上熱塵土以壅其心上小冷復易之氣通乃止又方濃煮蓼飲之至二升良效治溺水未死諸方治溺死若身尚暖者方取灶中灰兩石余以埋人從頭至足出七孔即活又方便脫取暖釜覆之取溺人伏上腹中出水便活也治溺死方屈死人兩腳著人肩上以死人背向生人背負持走吐出水便活治溺死一宿者尚可活方倒懸解衣挑去臍中垢極吹兩耳即活治溺水死已經二宿者可活方搗皂莢作末以綿裹納死人下部中須臾牽出即活也治溺水死方以灶灰布著地令厚五寸以甑倒覆灰上以溺人覆伏甑上口中水當出也覺水出復更別熬灰令暖量之溺人口中水已出極多便去甑即以暖灰壅溺人通身但出口鼻耳小時便蘇醒則活也又方令二健人抱溺人倒臥瀝溺人水出盡便活也治入井冢鬱冒諸方治入井冢悶冒方凡五月六月井中及深冢中皆有伏氣入中令人鬱悶殺人如其必須入中者先以雞鴨雜鳥毛投之直下至底則無伏氣毛若徘徊不下則有毒氣也亦可納生六畜等置中若有毒其物即死必須入不得已當先以酒若無以苦酒數升先灑井冢中四邊畔停少時然後可入若覺中有此氣鬱悶奄奄欲死者還取其中水灑人面令飲之又以灌其頭及身體即活若無水取他水用也治自經未死諸方治自縊死方傍人見自經者未可輒割繩必可登物令及其頭即懸牽頭髮舉其身起令繩微得寬也別使一人堅塞兩耳勿令耳氣通又別使一人以蔥葉刺其鼻中吹令通又別使一人齧死人兩踵根待其蘇活乃止也又方治自經死慎勿割繩也繩卒斷氣頓泄去便死不可復救也徐徐抱死人漸漸揉令繩漸寬也然後解下之心下尚溫取雞雌雄無在拔翅毛去勿令得飛也置地逐之竟宅走雞令極久久者其冠當黑止急以尺物拔死人口開便攣雞頭上割雞冠斷取血臨死人口中至喉咽氣便通治自縊死方以罽衣若氍㲣厚氈物覆其口鼻抑之令兩人極力吹其兩耳一炊頃可活也治服毒藥吞金未死諸方治服金屑取死未絶者方知覺是服金者可以一兩水銀瀉其口中搖動令入喉咽里便微接死人如坐形令水銀下流金則消成泥須臾從下部出也未出之頃死人亦蘇醒矣可三過服之便活也治射公毒諸方射公二名短狐三名溪毒其蟲形如甲蟲有一長角橫在口前如弩擔臨其角端曲如上弩以氣為矢因水勢以射人射人時人或聞其在水中鉍鉍作聲也要須得水沒其口便能射人在無水之地便可捉持戲無能為害也此蟲從四月始生至五月六月其毒尚微中人猶緩七月八月其毒大盛中人甚急八九月許有寒露微霜者其毒向衰至十月乃息也此蟲畏鵝鵝能食之聞鵝聲便不敢來也水上流有鵝浴氣響鵝矢毛羽流下其便走去也船行入溪宜將鵝自隨山溪家居皆養白鵝也凡入山溪水中採伐者裝鵝屎帶鵝毛以闢之也此蟲利耳而盲目凡人入溪源取水及浴經涉渡溪者皆宜以木石遙擲水中作聲其蟲應聲虛射毒便泄去也擲水法唯多過左右廣擲之蟲放毒盡然後過溪也山源之間多有此蟲大雨洪潦之時其逐水流落之人家及道上牛馬迹小水中停住人行陸地多不意悟或逐柴薪竹木來人喜不覺之得病便作它治乃誤致死也射公中人初始證候先寒熱惡冷欠呿筋急痙強頭痛目疼狀如傷寒亦如中尸便不能語朝旦小蘇晡夕輒劇寒熱悶亂是其證也初得三四日尚可活急者七日死緩者至二七日遠不過三七日皆死也此蟲有大小小者毒微射人不即作瘡人多不知是射公毒其大者毒猛中人乃即可成瘡耳其瘡初或如豆粒黑子或如火燒或如蛷螋溺或痛如針刺而未見瘡處或成瘡皆肉中有穿空如火針孔也其射人遠者及中人影者毒小寬也射公中人腰以上去人近者多死中人腰以下者小寬也縱不死者皆百日乃可保瘥耳治之如下治射公中人寒熱或發瘡或偏在一處有異於常方取赤莧合莖葉搗之絞取汁服七合日四五服良此是莧菜之赤大者也又方單煮犀角飲以折其毒熱也治射公中人方取鬼臼目葉一把納苦酒中沾濕之竟熟搗絞取汁服一升日三又方犀屑二兩烏扇根二兩升麻三兩凡三物㕮咀以水四升煮取一升半分再服相去一炊頃盡更作又方取水菘搗絞取汁服一升日三即瘥又方取生茱萸莖葉一虎口握之斷去握前後余握中央便熟搗絞以水三升煮取一升七合頓服之神效治射公中人已有瘡者方取蜈蚣大者一枚小炙之搗末苦酒和敷瘡上良又方取斑蝥一枚火燒搗末苦酒和敷上又方取芥子搗令熟苦酒和厚塗瘡上半日又方取狼牙葉冬取根搗之令熟薄所中處又飲四五六合汁防毒恐入內也治丹疹毒腫諸方丹毒者方説一名天火也肉中忽有赤如丹塗之色也大者如手掌大其劇者竟身體亦有痛癢微腫者方用赤小豆二升舂下篩以雞子白和如泥塗之小干復塗之逐手消也竟身者倍合之盡復作內宜服漏蘆湯漏蘆湯方漏蘆二兩白蘞二兩黃芩二兩白薇二兩枳實二兩升麻二兩芍藥二兩大黃二兩甘草二兩麻黃二兩凡十物㕮咀以水一斗煮取三升分三服若是窮地無藥之處依説增損易服之及用後單行方也能以鋒針鑱去血然後敷藥大良增損方法無漏蘆用梔子十枚無白蘞亦可略耳無黃芩亦用梔子漏蘆黃芩並無者但以梔子一物亦足已之無升麻用犀屑無犀屑用蛇銜無大黃用芒硝無麻黃用葛根無葛根用石膏無白薇用知母無知母用葳蕤無葳蕤用枳實芍藥甘草亦可略耳都無藥但得大黃單服之亦大善升麻湯治丹疹諸毒腫潝漬方升麻二兩黃芩二兩梔子二十枚漏蘆二兩蒴藋根五兩芒硝二兩凡六物㕮咀以水一斗煮取七升停冷分用漬潝恆濕也升麻膏治丹疹諸毒腫熱瘡方升麻二兩黃芩二兩梔子二十枚白蘞二兩漏蘆二兩枳實三兩炙連翹二兩朔藋根四兩芒硝二兩蛇銜三兩凡十物切舂碎細細以水三升漬半日以豬脂五升煎令水氣竭去滓敷諸丹毒腫熱瘡上日三若急須之但合水即煎之治丹諸單行方或得一物瘥水苔生蛇銜生地黃生菘葉蒴藋葉五葉藤慎火草浮萍草豆豉水和大黃水和梔子水和黃芩水和芒硝水和上十三味但得一物搗以貼之即瘥赤小豆末和雞子白塗之無雞子水和用之又方新附淋草半斤蛇退皮一條露蜂房三兩上三味以水一斗煮取四升以帛拓洗之隨手消神妙經用效故附此卷傳之又方煮粟取濃汁以洗之妙又方取曲蟺糞水和如泥塗之治白疹方宜煮蒴藋湯與少酒以浴佳又方以酒煮石楠草拭之又方水煮礬石汁拭之治赤疹方宜生地銜草塗之最驗大法如治丹諸方治腫毒初起方敗龜板一枚燒研酒服四錢治瘭疽諸方飈疽者肉中忽生一黯子小如豆粒小者如米粒粟劇者如梅李大或赤或黑或青或白其黯狀實脈脈有根而不浮腫也痛慘應心其根極深達肉肌也小久不治便四面悉腫疱黯黕紫黑色能爛壞筋骨也毒流散逐脈走入臟腑則殺人南方人名為㩉著毒得著厚肉處皆即割去之亦燒鐵令赤爍疱上令焦如炭亦灸黯疱上百壯為佳單舂酸摹葉薄其四面以防其長也飲葵根汁藍青汁犀角汁升麻汁竹瀝汁黃龍湯諸單治能折其熱耳內外治法依治丹毒方也飈疽著指頭者其先作黯疱然後腫赤黑黯黕慘痛入心是也代指者其先腫欣欣熱痛色不黯黕也治代指似瘭疽諸方代指者其狀先腫焮焮熱痛色不黯黕然後緣爪甲邊結膿劇者爪皆脫落亦謂之代指病也代指無毒正由人筋骨中熱盛撮結故耳吳人名遭指野夫名為土盧即皆是代指疾也治之方單煮甘草汁漬之或用芒硝湯漬之搗青菜汁拓之但得一種浸拓之即瘥代指疼痛豬膏和白墡土敷之治風熱毒腫熱瘡諸方有風熱毒相搏為腫其狀先腫焮熱上生瘭漿如火爍者名風熱毒也治之如治丹毒法也熱瘡者起瘡便生白膿是也治洪燭瘡諸方有洪燭瘡身上忽生瘭漿如沸湯灑劇者竟頭面亦有胸脅腰腹通體如火湯爍瘭漿起者是也治之法急宜服漏蘆湯下之外宜以升麻湯浴但倍分多煮之以浴潝之其間敷升麻膏佳若窮地無藥者但依治丹法用單行草菜方也治蛷蝮尿生瘡諸方有蛷蝮蟲尿人影便令人病也其狀身中忽有處慘痛如芒刺亦如蟲所吮螫然後起細㾦癗作聚如茱萸子狀也其㾦癗邊赤中尖有白膿如粟粒是也亦令人皮肉急劇惡寒壯熱劇者連起竟腰脅胸背也初得便以水摩犀角塗之以止其毒治之如火丹法並諸草菜單行治也蛷蝮尿人初未發瘡之時欲與射公相似射公瘡止有一處黯黑蛷蝮瘡促促連聚作搊痛法亦小疹以為異耳然非殺人疾也形似蛷蝮亦象飈疽治釘毒瘡瘑疥癬惡瘡諸方治瘑癬疥惡瘡方水銀礬石蛇床子黃連各二兩四物搗篩以臘月豬膏七合並下水銀攪萬度不見水銀膏成敷瘡並小兒頭瘡良治濕瘑疥瘡方胡燕窠大者用抱子處土為末以淡鹽湯洗拭干敷之日一上治惡核惡肉惡脈諸方有惡核病者肉中忽有核纍纍如梅李核狀小者如豆粒皮肉中慘痛左右走人身中壯熱索索畏寒是也與諸瘡痕瘰癧結筋相似其瘡痕瘰癧要因瘡而生是緩疾無毒其惡核病卒然而起有毒不治入腹煩悶則殺人南方多有此疾皆是風月受溫風至春夏有暴冷相搏氣結成此毒也宜服五香連翹湯以小豆薄塗之得消也亦煮五香湯去滓時時洗漬之消化之後以丹參膏敷余核令消盡不消盡者還敷小豆薄也五香連翹湯治惡脈及惡核瘰癧風結諸核腫氣痛方青木香二兩麝香半兩沉水香二兩薰陸香一兩雞舌香一兩連翹子二兩射干二兩升麻二兩獨活二兩寄生二兩大黃三兩甘草二兩淡竹瀝二升凡十三物㕮咀以水九升煮藥汁水減半許可納竹瀝汁又克取三升分三服丹參膏治惡脈及惡核瘰癧風結諸核腫痛方丹參二兩蒴藋根二兩菵草半兩秦艽一兩獨活一兩躑躅花半兩蜀椒半兩白芨一兩牛膝一兩菊花一兩木防己一兩烏頭一兩凡十二物細切為善以苦酒二升漬之一宿夏月半日急疾即煎之以豬膏四升煎令苦酒竭勿令暴焦熬也去滓以膏塗諸疾上日五六至良有惡肉病身中忽有肉如赤豆粒突出便長推出不息如牛馬乳亦如雞冠狀也不治其為自推出不肯止亦不痛癢也此由春冬時受惡風入肌脈中變成此疾也治之宜服漏蘆湯外燒鐵爍之日日稍爍令焦盡也爍竟以升麻膏敷之積日乃瘥耳治惡脈病方宜服五香連翹湯及竹瀝湯鑱去惡血敷丹參膏積日則瘥亦以白雄雞屎塗之治氣腫氣痛諸方有氣腫病其狀如癰無頭虛腫色不變皮上急痛手裁著便覺痛此由體熱當風覆被暴冷涼折之結成氣腫也宜服五香連翹湯白針氣寫之敷蒺藜薄亦可用小豆薄並得消也蒺藜薄方蒺藜子二升下篩以麻油和如泥熬令焦黑以塗細故熟布上剪如腫大勿開頭潝之無蒺藜可舂小豆下篩雞子白和塗腫上干復塗之並得消也有氣痛病身中忽有一處痛如打棵之狀不可堪耐亦左右走身中發作有時痛發時則小熱痛靜時便覺其處如冷水霜雪所加此皆由冬時受溫風至春復暴寒涼來折之不成溫病乃變作氣痛也宜先服五香連翹湯數劑及竹瀝湯摩丹參膏又以白酒煮楊柳樹皮暖尉之有赤氣點點見處宜鑱去血也其間將白薇散小竹瀝湯治氣痛方淡竹瀝二升夜干二兩杏仁二兩茵芋半兩黃芩半兩白朮二兩木防己二兩防風二兩秦艽二兩茯苓三兩麻黃一兩獨活二兩枳實二兩芍藥二兩甘草二兩凡十五物㕮咀以水九升煮藥折半乃可納竹汁煮取三升分四服少嫩人分作五服白薇散治風熱相搏結氣痛左右走身中或有惡核疹起者積服湯餘熱未平復宜此白薇散以消餘熱方白薇六分葳蕤四分當歸四分麻黃三分秦艽五分天門冬四分蜀椒二分木防己四分紫胡三分菵草二分獨活四分枳實四分烏頭二分術六分人參四分夜干六分山茱萸四分青木香四分防風六分白芷三分凡二十物搗下絹篩以酢漿服方寸匕漸至二匕日三少嫩人隨長少減服之毒微者可用酒也治緩疽諸方治緩疽方初作宜服五香連翹湯鑱去血以小豆薄塗之其間數以鑱針去血又薄之取消良也不消色未變青黕者以練石薄薄之若失時不得消已爛者猶服五香連翹湯及漏蘆湯下之隨熱多少投方也外以升麻湯潝洗之敷升麻膏若生臭惡肉者可以單行一物白䕡茹散敷之青黑肉去盡便敷也好肉熟生但敷生麻膏良肉不生敷單行一物黃耆散也若敷白䕡茹散積日青黑惡肉不盡者可以漆頭赤皮䕡茹散取半錢匕和雜三大錢匕白䕡茹散中合冶之稍以敷之惡肉去盡還淳用白䕡茹散也視好肉欲生可敷黃耆散也白䕡茹散漆頭䕡茹散黃耆散上三方並一物單行隨多少舂下篩用耳治緩疽初作即以小豆薄塗之亦消也治附骨疽與賊風相似諸方附骨疽一名潝疽以其無頭附骨成膿故也又名癰疽以其廣大竟體有膿故也附骨急疽與賊風實相似也其附骨疽者由人體盛有熱久當風冷入骨解中風與熱相搏其始候為欲眠沉重惚惚耳急者熱多風少緩者風多熱少也賊風者其人體平無熱中暴風冷則骨解深痛附骨疽久者則腫見結膿賊風久則枯痟或結瘰癧以此為異也是附骨疽而作賊風治則益其病深膿多也是賊風而作附骨疽治則加其冷風增遂成瘰癧偏枯攣曲之疾也附骨急疽者其痛處壯熱體中乍寒乍熱索索惡寒不用熱小便或赤大便或難無汗也即得治下去熱便得消也縱不消盡亦得浮淺近外易得壞潰其不復附骨也賊風之證但痛應骨不可按抑痛處不壯熱體不仁乍寒乍熱但覺體瘮以冷欲得熱熱尉痛處即小寬時有汗也即得針灸尉服治風溫藥便效也初得附骨疽即服漏蘆湯下之敷小豆薄得消也下利利已虛而腫處未消者可除大黃用生地黃及乾地黃也熱漸退餘風未歇者可服五香連翹湯除大黃也餘熱未消可敷升麻膏佳若失時不消成膿者用火針膏散如治癰法也治䐔病似疽諸方治䐔病方宜服漏蘆湯自下外以鋒針數鑱去血氣針瀉其結核處敷小豆薄則消皆可依治丹法消之亦用治癰三物甘焦薄薄也及至潰成膿火針敷膏散亦如治癰法之治癰癤瘻諸方經言寒氣客於經絡之中則血氣凝澀不行壅結則為癰疽也不言熱之所作其成癰久寒化為熱熱盛則肉腐爛為膿也依經診候之由人體中有熱被寒冷搏之血脈凝澀不行熱氣擁結則為癰疽也是以治癰疽方有灸法者治其始其始中寒未成熱之時也其用冷薄貼者治其熱已成以消熱使不成膿也今人多不悟其始不用溫治及灸法也今出要方以治其成形者耳赤色腫有尖頭者根廣一寸以還名為癤其廣一寸以上者便為小癰也其如豆粒大為疱治作癰令消方取鹿角就磨刀石上水摩之以汁塗燥復塗則消也內宜服連翹湯下又方生舂小豆下篩雞子白和如泥塗之治始作癰正赤熱痛方單燒鹿角作未苦酒和薄之干復塗之自消又方單搗大黃苦灑和薄之溫則易治癰及癤始結腫赤熱方水摩半夏塗之燥更塗得䐢便消也山草中自可掘取半夏乃佳神驗有石癰者始微堅皮核相親著不赤頭不甚尖微痛熱熱漸自歇便極堅如石故謂石癰難消又不自熟熟皆可百日中也初作便服防己連翹湯白針氣寫之敷練石薄積日可消若失時不得治不可消已有膿者亦用此薄則速潰膿淺易為火針諸癰潰後用膏散依治緩疽法初作即以小豆薄塗之亦消也治癰結腫堅如石或如大核色不變或作石癰不消者方鹿角八兩燒作灰白蘞二兩粗理黃色磨石片一斤燒石極令赤納五升苦酒中復燒燒竟復更納苦酒中令減半止搗石作末並鹿角屑白蘞屑以余苦酒和如泥厚塗癰上才幹更塗取消也治石癰方單磨鹿角半夏塗不如上方佳也治始發諸癰疽發背及乳癰方半夏末雞子白和塗良生者神驗以水和塗之有瘻者始結腫與石癰相似所可為異者其一種中按之壘壘有數核便是也初作喜不痛不熱即以練石薄敷之內服防己連翹湯下之便可得消若失時不治結膿者亦以練石薄薄令速熟熟用火針膏散如治癰法初作即以小豆薄塗之亦消又桐君説赤小豆白蘞黃芩黃耆牡蠣凡五物分等下篩酒服方寸匕治乳癰妒乳生瘡諸方治乳癰方大黃二分菵草二分伏龍肝二分生薑二分凡四物合篩以薑並舂治以醋和塗乳最驗單地黃煎主補虛除熱散乳石癰疽瘡癤等熱方生地黃隨多少取汁於銅鉢中重湯上煮勿蓋釜令氣得泄煎去半更以新布濾絞去粗滓穢又煎令如餳成矣此用地黃鬚肥大味濃者作煎甘美東南地黃堅細味薄作煎咸不美治奶發諸癰疽發背及乳方神效水磨治妒乳方以雞子白和小豆散塗乳房令冷以消結也又宜以赤龍皮湯天麻草湯洗之敷黃連胡粉膏赤龍皮湯槲樹皮切三升以水一斗煮取五升夏月冷用之秋冬溫之分以洗乳天麻草湯天麻草切五升以水一斗五升煮取一斗隨寒溫分洗乳治妒乳方黃芩白蘞芍藥各等分上三味下篩漿水服一錢五匕日三若右乳結將去左乳汁左乳結即將去右乳汁服即消又方柳白皮酒煮令熱以尉上即消又方苦酒磨升麻若青木香若檀香以摩上並良一味即得佳又方已入腹者麝香薰陸香青木香雞舌香各一兩以水四升煮取二升分再服忌蒜面酒牛馬豬肉治妒乳方生地黃汁以薄之又方葵根搗為末服方寸匕日三治婦人乳毒方敗龜甲一枚燒研酒服四錢治耳眼鼻口齒諸方治耳聾方巴豆十四枚去心皮松脂半兩練去滓凡二物合搗取如黍米粒大著簪頭著耳中風聾即愈勞聾當汁出癢後乃愈數用有驗聾有五種風聾者掣痛勞聾者黃汁出干聾者耵聹生虛聾者蕭蕭作聲聤聾者膿汁出治之方鯉魚腦如小豆綿裹塞良治風聾耳中鳴方但用鯉魚腦竹筒盛塞頭蒸令煬以灌耳即愈又方附子菖蒲分等搗以綿裹塞兩耳甚良治聤耳出膿汁散方礬石三兩燒汁令盡黃連一兩烏賊骨一兩上三物搗冶下篩如棗核大綿裹塞耳日二耳中膿血出作聤耳治之不愈是有蟲也治之方鯉魚腸一具細銼之以酢三升合搗布裹以塞兩耳食頃當聞痛痛則看應有白蟲出著藥乃去故藥更著新者須蟲盡乃止治蟲入耳者方取椒一撮末之以半升酢漿漬取汁溫灌耳中行十四步蟲則出又方醬苦酒漿汁灌之又方綿裹白膏塞耳蟲則死著綿出又方用車轂脂塗耳孔蟲則出治蚰蜒入耳方炒麻子葛囊盛之傾耳枕之蟲聞香則出治蜈蚣入耳方炙豬肉掩耳即出治眼漠漠黃連洗湯方黃連二兩秦皮二兩蕤仁半兩上三味㕮咀水三升煮取一升半絞去滓適寒溫以洗目日四五度又加升麻二兩加水煎之忌豬肉治目卒不所見方銼梓木煮以洗目日三治目清肓無所見方以赤鯉魚膽並腦雜真珠合和綿取注眥中治目痛方以鹽湯洗之良又方以蘘荷根取汁著竹筒中著目中即愈治眼風結腫合或眼生翳人口吹之睛中牽引疼痛白睛赤起出或黑變黃從下上覆半睛者秦皮湯方秦皮洗黃連各二分黃柏三分大棗五枚蕤仁二分上五味切以水二升煮取一升以洗眼忌豬肉治眼膚肉生覆瞳子者方取針燒令赤爍著膚上不過三爍縮也有令人割之三復生不如爍之良治眼中生息肉並白赤障翳散方貝子十枚燒真珠一分凡二物冶下篩爪取如小豆著翳上病人正仰眼他人與之可再三經一食久拭之神良治目為物所中方羊膽雞膽魚膽皆可用注之治目為物所中傷有熱痛而暗方斷生地膚草汁注之冬日煮乾取汁注也治鼻中窒塞香膏方白芷當歸芎藭細辛辛夷通草桂心薰草各三分上八味㕮咀以苦酒漬一宿以豬膏一升煎以白芷色黃成膏濾去滓取少許點鼻中或綿裹納鼻中以瘥止治鼻中塞肉通草散方通草半兩真珠六銖碎礬石一兩燒細辛一兩上四物搗末以綿裹如棗核沾散如小豆並綿頭納鼻中日三取瘥治緊唇方俗諺言良方善技出於阿氏是余少時觸風乘馬行獵數苦緊唇人教纏白布作大燈炷著空斧中燒布斧刃有汗出以指瀝取塗唇即瘥治齒蟲腐棘刺漱湯方腐爛棘針二百枚即是棗木刺朽落地者用一物以水二升煎取一升含之即瘥日四五度治甘蟲食齒根方伏龍肝置石上著一撮鹽須臾化為水以面展取待凝厚取納病上又方皂莢去皮塗上蟲出治有飲酒醉吐牙後湧血射出不能禁者方取小釘燒令赤正注血孔上一注即斷釘當令赤不赤能不斷也治癭病諸方癭病者始作與癭核相似其癭病喜當頸下當中央不偏兩邊也乃不急膇然則是癭也中國人息氣結癭者但重膇膇無核也長安及襄陽蠻人其飲沙水喜癭有核瘰瘰耳無根浮動在皮中其地婦人患之腎氣實沙石性合於腎則令腎實故病癭也北方婦人飲沙水者産乳其於難非針不出是以比家有不救者良由此也治癭方小麥一升醇苦酒一升漬小麥令釋漉出暴燥復漬使苦酒盡暴麥燥搗篩以海藻三兩別搗以和麥末令調酒服方寸匕日三禁鹽生魚生菜豬肉治癭瘤諸瘻昆布丸方昆布八兩炙海藻七兩洗炙小麥一升熬海蛤五兩松蘿四兩連翹二兩白頭翁二兩上七物搗下篩和蜜丸如梧子服十丸日三稍加三十丸治瘰癧諸方治三十歲瘰癧癭方海藻一斤絹囊盛好清酒二斗漬之春夏二宿服二合酒盡復以酒二斗漬之飲如上法此酒盡爆海藻令燥末服方寸匕日三藥無所禁一劑不愈更作不過三劑也治頽脫肛痔下部諸疾衆方牡丹五等散治頽疝陰卵偏大有氣上下脹大行走腫大為妨服此方良驗牡丹去心防風桂心豉熬黃柏各一分凡五物冶下篩酒服一刀圭匕二十日愈治少小頽疝最良嬰兒以乳汁和如大豆與之長宿人服方寸匕牡丹散治㿗偏大氣脹方牡丹桂心防風鐵精豉熬各等分上五味搗篩酒和方寸匕服之小兒一刀圭二十日愈嬰兒以乳汁和大豆與之大效忌生蔥胡荽治脫肛驗方蒲黃二兩豬膏三合凡二物搗合和敷肛上當迫納之不過再三便愈治脫肛熏方以女萎一升以器中燒坐上熏肛門即愈治若腸隨肛出轉廣不可入一尺來者方搗生栝蔞取汁溫服之以豬肉汁洗手隨抑按自得入若腸隨肛出方熬石灰令熱布裹尉之隨按令入冷即易治五痔散主酒客勞及損傷治下部中傍孔起居血縱橫出及肉方赤小豆四分熬黃耆三分附子炮白蘞桂心各一分芍藥黃芩各二分上七味搗為散以酒服方寸匕日三止血大驗又方藜蘆大黃黃連各半兩練木子十四枚桃仁十四枚去皮巴豆四枚去皮心萆麻十四枚一名狗蜱上七味㕮咀以豬肪一升煎三沸下去滓敷贅肉上日三外著此膏內服紫參丸常並行治五痔大便肛邊清血出紫參丸治久不瘥服之無不瘥方紫參秦艽亂髮灰紫菀厚朴炙以上各一兩藁本二兩雷丸半斤白芷一兩蟅蟲半兩熬石南半兩炙貫衆三兩去毛豬後懸蹄甲十四枚炙虻蟲半兩去翅足熬上十三味搗篩以羊脊骨中髓合豬脂各半升煎和丸如梧子未食酒服十五丸日再亦可飲下劇者夜一服四日肛邊癢止八日膿血盡鼠乳悉愈滿六十日終身不復發久服益善有痔病十八年肛出長三寸服此方即愈亦治脫肛有人熱可除羊髓以赤蜜代禁生冷魚肉治穀道中癢痛痔瘡槐皮膏方槐皮五兩甘草當歸白芷各二兩陳豉桃仁各五十粒去皮赤小豆二合上七味銼以豬脂二升煎候白芷黃膏成去滓以塗之日三度治狐臭諸方治胡臭漏腋有天生胡臭有為人所染臭者天生者難治為人所染者易瘥然須三年敷白礬散勿止並服五香丸乃可得瘥勿言一度敷藥即瘥只可敷藥時暫得一度瘥耳凡胡臭人通禁食蕓薹五辛治之終身不瘥胡臭方辛夷芎藭細辛杜蘅蒿本各二分上五味㕮咀以苦酒漬之一宿煎三日取汁敷之欲敷臨時以瘥為度治人體及腋下狀如狐𤜢氣世謂之胡臭方燒好礬石末絹囊盛之常以粉腋下不過十度令人香方甘草松樹根及皮大棗甜瓜子凡四物分等末服方寸匕日三二十日覺效五十日身體並香百日衣服床幃皆香治手足腋下股恆濕諸方治漏腋腋下及足心手掌陰下股里恆如汗濕致臭者六物胡粉膏方干商陸一兩干枸杞白皮半兩乾薑半兩滑石一兩甘草半兩胡粉一兩上六物冶末以苦酒和塗腋下微汗出易衣復更著之不過三便愈或一歲復發發覆塗之不可多塗與傷人腋也漏腋方正朝旦以小便洗治身㾦癗有氣口瘡諸方待考治面㾴疱瘡瘢諸方治面㾴木蘭散方木蘭皮一斤漬以著三年酢中趣令沒之百日出木蘭皮曝燥搗為散服方寸匕日三治面皰方土瓜冶以水銀胡粉青羊脂分等和敷面上日二有效又方胡粉二分水銀四分以豬膏和研敷面天曉以布拭去勿洗水治面上惡瘡術胡粉五兩熬黃柏五兩黃連五兩三物冶下篩粉面瘡上日三滅瘢方雞矢白一兩辛夷仁四分白附子二分細辛二分上四味酒浸一宿以羊脂六合微火煎三上三下去滓傷瘢以甘草洗訖塗之又方鷹屎白一兩研白蜜和塗瘢上日三治面皯𪒟黑痣諸方治面皯方白蜜和茯苓塗滿之七日便瘥又方杏仁去皮冶令細雞子白和之敷經宿拭去治面黯滅瘢痕除皯去黑痣方薺苨二分桂心一分上二味搗篩以酢漿水服方寸匕日一止即脫又服梔子散瘥治白癜赤疵諸方待考治蟲獸狗馬毒諸方治蜂螫人方取蜘蛛塗瘡上又方以活蜘蛛放毒上其自嗽毒治蜂螫人方斫榖木取白汁塗之桑汁亦良治蜈蚣螫人方嚼鹽塗之效又以鹽拭瘡上蜈蚣未遠不得去又方嚼大蒜若小蒜或桑白汁以塗之亦以麻履底土揩之良又方取屋中土以水和敷之治蜈蚣螫人方割雞冠血塗之又方以鹽湯漬之即愈治蠣螫人方取屋霤下土以水和敷之立愈治竹中青蝰蛇螫人方雄黃乾薑上二味各等分搗篩以射菵和之著小竹管中帶之行有急便用敷瘡兼治諸蛇毒治蛇螫人牙折入肉中不出痛不可堪方取蝦蟆肝以敷上立出蛇入人口中不出方艾灸蛇尾即出若無火以刀周匝割蛇尾截令皮斷乃將皮倒脫即出入山草避衆蛇方乾薑生麝香雄黃三物搗以小囊帶之男左女右則蛇逆走避人不敢近也人為蛇侵者可以此治之大良治熊虎爪牙所傷毒痛方燒青布以熏瘡口毒即出仍煮葛根汁令濃以洗瘡日十度並搗葛根為散煮葛汁以服方寸匕日五甚者夜二治虎毒方燒婦人月水汙衣末敷瘡中又方嚼栗塗神良治狂犬咬人方刮狼牙或虎牙骨末服方寸匕已發狂如猘犬者服此藥即愈又方頭髮蝟皮燒作灰末等分和水飲一杯若或已目赤口噤者可折齒灌之又方搗地黃汁飲之並塗瘡上過百日止治猘狗齧人方取杏仁熬令黑冶著瘡中佳衆治不瘥毒攻人煩亂喚已作犬聲者方髑髏骨燒灰末以東流水和服方寸匕以活止凡狂犬咬人七日輒應一發過三七日不發則免也要過百日乃為大免每至七日輒當搗薤汁飲二三升又當終身禁食犬肉蠶蛹若食此發則不可救之瘡未瘥之間亦忌食生魚諸肥膩肉及諸冷食但於飯下蒸生魚及就膩器中食便發不宜飲酒能過一年乃佳若重發者治之方生食蟾蜍膾絶良亦可燒炙食之不必令其人知初得齧便為此則不發剝作膾吞蒜齏下也又方搗生薑汁一升以來服之佳禁飲酒食豬肉生菜鱠鮓治馬咋踏方搗車前草葉薄之治馬咬人及踏人作瘡毒腫熱痛方取馬鞭稍三尺鼠矢二七枚燒末以豬膏和塗之立愈治剝死馬馬骨傷人手毒攻欲死方取死馬腹中屎以塗之即瘥治馬骨所刺及馬血入人攻瘡中毒痛欲死方人糞泥之又搗馬莧敷之治馬汗入人瘡方煮沸湯及熱以漬之冷復易之治馬骨所刺及為馬所踏咋為馬汗血毛垢矢溺入人瘡中及人有創而近馬物毒氣入創中先針刺傷出新血數過嗽去之研豉作湯令小沸以漬創又方可用熱灰汁又方煮馬莧草洗之並服汁又方以車前草葉搗敷之治被壓迮墮捥折斫刺金瘡諸方治為人所打擊若見鎮迮頭破腦出已死尚有氣在胸心間方取豚血及熱灌腦中令滿瘡里無豚者唯趣得熱血而灌之又方服水銀如大豆即活治被打擊有瘀血在腹內久不消時時發動方大黃二兩乾地黃四兩上二味搗散為丸以酒服三十丸日再為散服亦妙若久宿血在諸骨節及脅肋外不去者方牡丹虻蟲去足熬等分上二味搗末以酒服方寸匕血化成水忌胡荽又方鐵一斤酒三升煮取一升服之又燒令赤投酒服之治從高墮下腹中崩傷瘀血滿斷氣方服蒲黃方寸匕日五六過又方舂生地黃酒沃取汁稍服甚良治從高墮若為重物所鎮迮得瘀血方作大豆紫湯如産婦法服之治從高墮下若為重物所頓迮得瘀血方豆豉三升沸湯二升漬之食頃絞去滓納蒲黃三合投中攪調頓服之不過三四服神良治捥折四支骨方若有聚血在折上以刀破去之不可冷食也舂大豆以豬膏和塗聚血上燥復易之又方燒鼠屎豬膏和敷血上甚良治腕折四肢骨碎及筋傷蹉跌方生地黃不限多少爛搗熬之以裹傷處以竹編夾裹令遍縛令急勿令轉動一日可十易三日瘥若血聚在折處以刀子破去血治凡脫折折骨諸瘡腫者慎不可當風臥濕及多自扇若中風則發痙口噤殺人若已中此覺頸項強身中急束者急服此方竹瀝飲三二升若口已噤者可以物拗開納之令下禁冷飲食及飲酒竹瀝卒燒難得多可合束十許枚並燒中央兩頭承其汁投之可活凡以八九月刺手足以犯惡露殺人不輕也治之方用生竹若桑枝兩三枚郁著火中為推引之令極熱研碎斷之正以頭注創口上熱盡復易著一枚盡三枚則創當正白爛及取薤白搗以綿裹之著熱灰中使極熱乃去綿取薤以薄創上以布帛急裹之若創故腫者更為之若已中水及惡露風寒腫痛者以鹽數合急折著創上以火炙之令熱達創中畢以臘納竹管中以管貯熱灰中炮之臘煬以灌創若無鹽薤者但膜便可單用治惡露創方取蒲若敗青布於小口器中若坎中燒以熏之創中汁出則愈治狐刺方以熱蠟灌瘡中又煙燻之令汁出愈此狐所溺之木猶如蛇螫也金創無大小冬夏始傷血出方便以白灰厚敷之仍裹若創甚深不欲便令合者納少滑石滑石令創不時合又止痛亦可內少少牡蠣若卒無白灰可用凡灰已膿中有蟲白灰敷之日三蟲當出故並州劉田方蓋常祕之金創腸胃脫出欲令入法取人糞乾末以粉腸上即入金創被筋絶令還續方取蟹頭中腦及足中肉髓熬之納創中筋即生續之治金瘡中風方蜀椒量瘡大小用面作餛飩煻灰中炮令熟及熱開一小口當瘡上掩之即引風出可多作取瘥治被毒箭傷方雄黃末敷之當沸汁出即愈又方食麻子數升愈搗飲其汁亦佳又方但多食生葛根自愈食無限不能或搗生葛絞取汁飲之乾者煮取飲之又方煮蘆根汁飲一二升卒被毒箭方舂藍汁飲之亦灌創菵箭得藍即醒又方服蒲黃二合許血亦下治箭金在喉咽胸背隔中及在諸處不出方牡丹一分白蘞一分末酒服方寸匕日三自出又方取婦人月經衣已汙者燒末酒服方寸匕日三立出治金瘡箭在肉中不出方半夏三兩洗白蘞三兩上二味下篩以酒服方寸匕日三淺者十日出深者二十日出終不住肉中治箭金及折針不出方以鼠腦塗之又方以鼠婦塗之又方以螻蛄腦塗之治箭醫針在肉中方細刮象牙屑以水和之如杏著折針上即出亦治竹木刺不出者
