body:
  text: 卷第四要方第四卷所治如下治霍亂諸方治中惡諸方治食毒諸方治中蠱毒諸方治吐下血鼻衄尿血諸方治發黃患淋諸方上六件治霍亂諸方霍亂吐痢心煩亂髮湯主之方亂髮一枚如鴨子大燒令焦人參一兩吳茱萸一升甘草一兩炙上四味切以水三升酒二升煮取二升絞去滓溫服五合忌海藻菘菜治霍亂吐痢已服理中及四順湯不解者以竹葉湯方竹葉一虎口寸切之小麥一升生薑十兩甘草一兩炙人參一兩附子一兩炮肉桂二兩當歸二兩芍藥一兩白朮三兩橘皮二兩上十一味以水一斗半先煮小麥竹葉取八升汁去滓納諸藥煮取二升半分三服吐痢後腹滿加厚朴二兩炙上氣加吳茱萸半升瘥理中四順則大熱熱毒霍亂宜竹葉湯忌生蔥海藻菘菜豬肉桃李雀肉等霍亂吐痢而汗出小便復利或下利清穀裡外無熱脈微欲絶或惡寒四肢拘急手足厥逆四逆加豬膽湯主之方甘草二兩炙乾薑半兩炮附子一枚生去皮破八片豬膽汁半合上四味切以水二升煮取一升四合溫分再服無豬膽以羊膽代之強人可與大附子一枚乾薑加至三兩若吐之後吸吸少氣者及下而腹滿者加人參一兩諸藥皆減為一兩如證者亦宜與理厥人參湯佳忌海藻菘菜豬肉四順湯與前治同常用此方人參三兩一方二兩乾薑三兩一方一兩甘草三兩一方一兩炙附子二兩範汪方用一兩上四味切以水六升煮取二升絞去滓溫分三服轉筋肉冷汗出嘔噦者良忌海藻菘菜豬肉範汪方云利甚者加龍骨二兩炒白丸治霍亂嘔吐及暴痢良方半夏三兩洗附子四兩炮乾薑四兩炮人參三兩桔梗二兩上五味作散臨病和之若吐痢不止者以苦酒和之飲服二丸如梧子不瘥復服耐藥者加之以意下者以蜜和丸亦得忌豬羊肉餳理中湯治霍亂吐下脹滿食不消心腹痛方人參三兩白朮三兩甘草三兩炙乾薑三兩上四味以水六升煮取三升絞去滓溫分三服不瘥頻進兩三劑遠行防霍亂作丸如梧子服二十丸散服方寸匕酒服亦得若轉筋者加石膏三兩忌海藻菘菜桃李雀肉等治心腹暴痛及宿食不消或宿冷煩滿成霍亂方作鹽湯三升使極咸熱飲一二升刺吐令宿食盡不吐復服吐訖復飲三吐乃佳須淨乃止勝諸湯丸霍亂腹疼吐下方取桃葉冬天用皮絞取汁一服一杯立愈亦可濃煮飲三升治霍亂腹痛脹滿短氣不得吐下灸不效者熱伏心臟中煩悶鬱郁者方可取白粉水和如糜汁傾之頓飲一升許即吐者便愈不吐者刺吐之永不吐者皆危也無粉者折秫米取汁治霍亂洞下腹痛方以艾一把以水三升煮得一升頓服之良霍亂臍上築者腎氣動也先治氣理中湯去朮加桂凡方加朮者以內虛也加桂者恐作奔豚也理中湯方人參三兩甘草三兩炙白朮三兩乾薑三兩炮上四味切以水八升煮取三升去滓溫服一升日三夜一若臍上築者腎氣動也去朮加桂心四兩吐多者去朮加生薑三兩若下多者復用術悸者加茯苓二兩若病先時渴喜得水者加朮合前成四兩半若腹中痛者加人參合前成四兩半若惡寒者加乾薑合前成四兩半若腹滿者去朮加附子一枚炮去皮破六片服湯後一食頃飲熱粥一升許汗微出自溫勿發揭衣被也忌海藻菘菜桃李雀肉等霍亂臍上築者以吐多故也若吐多者理中湯主之如前法加減霍亂四逆吐少嘔多者附子粳米湯主之方附子一枚炮去皮破六片半夏半升洗完用甘草一兩炙大棗十枚擘粳米半升上五味切以水八升煮米熟去滓溫服一升日三忌羊肉豬肉海藻菘菜餳霍亂卒吐下不禁脈暴數者人參湯主之方人參二兩茯苓二兩葛根二兩橘皮二兩麥門冬去心二兩甘草二兩炙上六味切以水五升煮取二升絞去滓溫分三服忌海藻菘菜酢物扶老理中散並作丸長服亦得治羸老冷氣噁心食飲不化腹虛滿拘急短氣及霍亂吐逆四肢厥冷心煩氣悶流汗悉主之方人參五兩乾薑六兩白朮五兩麥門冬六兩去心附子三兩炮茯苓三兩甘草五兩炙上七味作散臨病煮取三合白湯飲和方寸匕一服不效又服常將蜜丸酒服如梧子二十丸忌海藻菘菜豬肉桃李雀肉大醋治乾嘔逆噦手足厥冷橘皮湯方橘皮四兩生薑半斤凡二物以水七升煮取三升一服一升湯下咽即愈霍亂多寒手足寒厥脈絶茱萸四逆湯主之方吳茱萸二升當歸三兩芍藥二兩桂心四兩細辛二兩生薑半斤通草二兩甘草二兩凡八物以水四升清酒四升合煮取三升分四服治霍亂或引飲飲輒乾嘔方生薑五兩以水五升煮令得二升半分再服良又方煮高良薑飲之大佳治霍亂煩渴者方粢米汁泔飲數升立瘥又方取新汲冷水飲之治中熱暴下利霍亂變熱心煩脈數者方飲新出井水一升立愈飲多益善此治是胃中多熱者也無熱者慎之不可與也薺苨湯治先有石熱因霍亂吐下服諸熱藥吐下得止因空虛仍變煩手足熱口燥欲得水吐逆迷悶脈急數者及時行熱病後毒未盡因霍亂吐下仍發熱煩悶胸心欲破裂者方薺苨二兩人參二兩厚朴二兩知母二兩栝蔞二兩葛根二兩枳實二兩犀屑二兩藍子二合桔梗二兩橘皮二兩茯苓二兩黃芩二兩甘草二兩凡十四物以水八升煮取三升分五服治霍亂煩擾未得吐下方煮香薷汁濃熱飲之霍亂吐下汗出肉冷轉筋嘔逆煩悶欲得冷水者方可與厚朴葛根飲進沾喉中而已慎勿與米飲及粥但與此單行飲以代米飲水漿也又方取藿香一把以水四升煮取一升頓服立愈又方煮青木香汁飲至佳若霍亂注痢不止而轉筋入腹欲死者方生薑三兩搗破以酒一升煮三四沸頓服之霍亂轉筋入腹不可奈何方極咸作鹽湯於槽中暖漬之則瘥又方以醋煮青布㩉之腳膝冷復易之又方蓼一把去兩頭以水二升煮取一升頓服治霍亂轉筋方可以白酨煮粉及熱洗之治霍亂嘔啘氣厥不得喘息豉湯方豉一升半夏一兩洗生薑二兩人參一兩柴胡一兩甘草一兩炙上六物切以水五升煮取二升半溫服七合忌羊肉餳海藻菘菜等治卒道中得霍亂無有方藥氣息危急醫視捨去皆云必死治之方蘆蓬茸一大把煮令味濃頓服二升則瘥已用有效食中魚蟹毒者服之尤良治霍亂諸藥不能治亂髮湯方亂髮握如雞子熬令焦小蒜十四枚附子一兩炮甘草三兩炙上四味切以水六升煮取三升去滓溫分三服忌豬肉海藻菘菜凡霍亂醫所不治方童女月衣合血燒酒服方寸匕祕方湯藥灸周葎不瘥服之立愈治中惡諸方治中惡心痛胸脅㽱痛喘急湯方桃東行枝白皮一虎口真珠一兩研梔子仁十四枚生薑二兩當歸桂心各三兩附子一兩炮香豉五合吳茱萸五合上九味切以水八升煮取二升去滓納真珠分二服忌豬肉生蔥生血物五疰湯主卒中賊風遁尸鬼邪心腹刺痛大腹急方大黃三兩別漬甘草二兩炙烏頭十枚炮削皮生薑半斤桂心四兩芍藥當歸各二兩蜜一斤上八味切以水九升煮取三升烏頭別納蜜中煎令得一升投著湯中去滓分服三合如人行三十里又一服日三不知可至四合王尹威數用之忌海藻菘菜豬肉生蔥大岩蜜湯治中風身如角弓反張並主卒心腹絞痛方茯苓芎藭當歸甘草各一兩炙桂心二兩半梔子十四枚擘吳茱萸三兩細辛乾薑乾地黃各二兩上十味切以水八升煮取三升分為三服相去如行十里頃若痛甚者加羊脂三兩當歸芍藥人參各一兩心腹脹滿堅急者加大黃三兩忌酢生蔥生菜海藻菘菜蕪荑等又大岩蜜湯治中惡腹中絞痛並飛尸遁疰發作無時發則搶心脹滿脅下如刀錐刺並主少陰傷寒方甘草炙干黃細辛乾薑當歸羊脂青羊脂更勝桂心茯苓吳茱萸芍藥各一兩梔子十五枚擘上十一味切以水八升煮取三升去滓納脂溫分三服忌海藻菘菜生蔥生菜蕪荑酢物治食毒諸方食飲養小至長甚難逆忤致變甚速豈可不慎治諸食中毒者唯黃龍湯及屎汁無不治也飲馬尿汁亦良治人食菜及果子中蛇毒方大豆末以酒漬取汁半升服之又方以雞血和真鐵精吞如梧子大一丸治食魚中毒方煮橘皮涼飲之佳食魚中毒冬瓜汁最驗又方舂馬鞭草飲汁一升即消去又方生薑葉亦佳治食魚鱠及生肉住胸膈中不化吐之不出便成症方厚朴二兩大黃一兩凡二物以酒二升煮得一升盡服之立消食魚中毒面腫煩亂及食鱸魚肝中毒欲死方銼蘆根舂取汁多飲乃良並治蟹毒中鮐鯸魚毒方燒䱜魚皮水服之無見皮壞刀裝取之一名鮫魚皮食諸鮑魚中毒亦用之治食六畜肉中毒方取其畜干屎末水服佳若自死六畜毒方水服黃柏末方寸匕食六畜鳥獸方幞頭垢一錢匕起死人又方飲豉汁數升良治食野菜諸脯肉馬肝馬肉毒方以頭垢棗核大含之咽汁能起死人或曰白湯下亦可中萵苣毒中諸藥毒猘犬傷人並飲生薑汁即解治中蠱毒諸方治中蠱毒諸方人有養畜蠱毒以病人凡診法中蠱狀令人心腹切痛如有物齧或吐下血不即治之食人五臟盡即死矣欲知是蠱與非當令病人唾水沉者是浮者非也治蠱方鼓皮廣五寸長一尺薔薇根五寸如足拇指大細切上二味以水一升清酒三升煮取一升頓服之當下蠱即愈又方土瓜根大如拇指長三寸切以酒半升漬一宿一服當吐下又方皂莢三挺長一尺者炙去皮子美酒一升漬一宿去滓頓服又方取薺苨根搗為末以飲服方寸匕治蠱方櫸樹皮廣五寸長一尺蘆薇根五寸如人足父指大者凡二物切以水一升清酒三升煮取一升頓服當下蠱治中蠱毒吐血或下血皆如爛肝方蒨根三兩蘘荷根三兩上二味㕮咀以水四升煮取二升去滓頓服即愈又當自知蠱主姓名又方巴豆一枚去皮心熬豉三粒釜底墨方寸匕上三味搗分作三丸飲下一丸須臾當下蠱毒不下更服一丸治中蠱吐血方苦瓠一枚以水二升煮取一升分服當吐蠱如蝦蟆蝌蚪之類苦瓠毒可臨時量用之又方雄黃研釜月下黃土獺犴炙各如棗斑蝥十四枚去足翅熬上四味搗末以酪漿服之分為三四服則吐蝦蟆治中蠱心痛吐血欲死方鹽一升淳苦酒一升煮令消和一服立吐蠱毒出已用良驗治蠱毒腹痛注下赤血躑躅散方羊躑躅乾薑藜蘆熬附子炮巴豆去皮心熬野葛皮肉桂丹砂研雄黃研蜈蚣炙各一分上十味搗為散以水服一刀圭不知加一粟米忌豬肉蘆筍生血物生蔥貍肉治蠱下血欲死方薔薇根銼一升牛膝五株連翹子一升蠟一彈子許上四味切以水四升煮取三升分三服即愈治諸蠱大便下血日數十行方巴豆二七枚去心皮熬藜蘆炙附子炮芫青去足翅熬礬石各二分熬汁盡上五味搗下篩別研巴豆如膏和相得以綿裹一大豆許內下部中日二三愈忌豬肉蘆筍貍肉治蠱已食下部肚盡腸穿者取長股蝦蟆青背一枚雞骨一分燒為灰合納下部令深入治時歲蠱注毒下諸湯煎不能治欲死者方乾薑二兩附子二兩炮黃連二兩礬石二兩凡四物為散酒服方寸匕日三亦可以飲服又方黃連一分面二分凡二物冶末蜜丸水服如梧子雄黃丸治蠱注四肢浮腫肌膚消索咳逆腹大如水狀漏泄死後注易家人方一名蠱脹方雄黃研巴豆去心皮熬莽草炙鬼臼各四分蜈蚣三枚炙上五味搗篩為末蜜和更搗三千杵藥成密器封之勿令泄氣宿勿食服如小豆一丸不知加一丸當先下清水蟲長數寸及下蛇或如壞雞子或白如膏下訖後作蔥豉粥鴨羹補之忌生魚生菜豬肉蘆筍冷水暖食將養也治飲中蠱毒令人腹內堅痛面目青黃淋露骨立病變無常方豬肝一具蜜一升共煎之令熟分為二十服祕方又方取棗木心銼得一斛著釜中淹之令上有三寸水煮取二斗澄取清微火煎得五升宿勿食旦服五合則吐蠱毒出治蠱似蛔方雄黃研麝香研上二味各如大豆許取生羊肺如指大以刀開取雄黃等末以肺裹吞之治有人食新變魚取飽中毒病心腹痛心下堅發熱煩冤欲得水沃身動搖如魚得水狀有人診病云是蠱家云野中相承無此毒不作蠱治之遂死治吐下血鼻衄尿血諸方治吐血方用東向蘘荷根搗絞取汁一二升頓服立愈亦治蛄毒痔血婦人腰腹痛大起後出清血也治吐血汗血大小便血竹茹湯方竹茹二升甘草六分當歸六分芎藭六分黃芩六分桂心一兩術一兩人參一兩芍藥一兩凡九物以水一斗煮取三升分四服治汗出如水漿及汗血衄血吐血小便血殆死都梁香散方都梁香二兩紫菀一兩桂肉一兩人參一兩生竹茹一兩肉蓯蓉一兩乾地黃二兩凡七物冶篩以水服方寸匕治吐血內崩上氣而色如土方乾薑阿膠各二兩艾一把上四味㕮咀以水五升煮取一升納馬通汁一升煮取一升頓服治下血連歲不愈方黃連半斤上一味搗末以雞子白和為餅子微火炙令黃黑復搗篩飲服方寸匕日三有效下清血痿黃失色醫不能治者皆瘥忌豬肉諸下血者先見血後見便此為遠血宜服黃土湯若先見便後見血此是近血宜服赤小豆散赤小豆散方赤小豆三升熬當歸三兩凡二物冶篩服方寸匕日三黃土湯方灶中黃土半升綿裹甘草三兩炙乾薑二兩黃芩一兩阿膠三兩炙乾地黃五兩一方三兩凡六物以水一斗煮取三升分三服斷血諸方所云下血者其從腹裡出者悉為下血也有痔病血從孔邊出者別尋痔方治鼻衄血出數斗眩冒劇者不知人方乾薑屑龍骨末吹之即止又方取亂髮五兩燒之冶末取如棗核著筒頭吹著鼻孔中不止益末吹之並服方寸匕日三甚者夜二又方未龍骨為散著葦筒中吹鼻孔中即斷苦從耳出亦可吹之又治鼻衄積年夜臥起而肩頭有凝血數升衆治不瘥方舂榖葉絞取汁日飲三升不過四五飲愈神良治小便血菟絲丸方菟絲子蒲黃乾地黃白芷荊實葵子敗醬當歸茯苓芎藭各二兩上十味合搗為末以白蜜和丸如梧子大飲服二丸日三服不知加至五六丸劉洪玘方已效常服忌酢物蕪荑生地黃湯治小便血方生地黃半斤柏葉一把黃芩二兩膠二兩甘草二兩凡五物以水七升煮取三升絞去滓納膠令煬取二升半分三服治發黃患淋諸方黃疸麻黃醇酒湯主之方麻黃一大把去節綿裹上一味美清酒五升煮取二升半去滓頓服盡古令方云傷寒熱出表發黃疸宜汗之則愈冬月用酒春宜用水煮之良治黃疸身目皆黃皮膚麴塵出三物茵陳蒿湯方茵陳蒿一把梔子二十四枚擘石膏一斤完者上三味以水八升煮取二升半去滓以猛火燒石膏令正赤投湯中沸定取清汁適寒溫服一升自覆令汗出周身遍以溫粉粉之則愈若不汗更服一升汗出乃愈也凡人無故忽然振寒便發黃皮膚黃麴塵出小便赤少大便時閉氣力無異食飲不妨已服諸湯餘熱不除久黃者苦參散方苦參一兩黃連一兩葶藶子熬瓜蒂黃芩黃柏大黃各一兩上一味搗為散飲服方寸匕當大吐吐者日一服不吐日二亦得下服藥五日知可消息不知更服忌豬肉冷水黃家腹滿小便不利而赤身汗出者表和裡實也宜下之大黃黃柏皮梔子硝石湯方大黃四分黃柏四兩肥梔子十五枚擘硝石四兩末上四味切以水六升煮三物得二升半去滓納硝石更煎取一升先食頓服盡黃家日晡發熱而反惡寒此為女勞得之膀胱急小腹滿身體盡黃額上反黑足下熱因作黑疸大便必黑腹臚脹滿如水狀大便黑溏者此女勞之病非水也腹滿者難治硝石礬石散主之方硝石熬黃礬石燒令汁盡上二味等分搗絹篩以大麥粥汁和服方寸匕日三重衣覆取汗病隨大小便去小便正黃大便正黑也大麥則須是無皮麥者治黃疸之為病日晡所發熱惡寒小腹急體黃額黑大便黑溏泄足下熱此為女勞也腹滿者難治方滑石五兩碎研石膏五兩研上二味為散以大麥粥汁服方寸匕日三小便極利則瘥地膚湯治下焦諸結熱小便赤黃數起出少大痛或便血者溫病後餘熱及霍亂後當風取熱過度飲酒房勞及步行冒熱冷飲逐熱熱結下焦及散石熱動關格少腹堅胞脹如斗大諸淋服之即通方地膚草三兩知母豬苓去皮瞿麥黃芩升麻通草各二兩海藻一兩葵子一升枳實二兩炙上十味切以水九升煮取三升分三服大小行皆閉者加大黃三兩婦人房勞腎中有熱小便難不利腹滿痛脈沉細者加豬腎一具治淋榆皮湯方榆皮半斤滑石二兩一方一兩黃芩一兩一方二兩甘草炙瞿麥各二兩葵子一升上六味切以水一斗煮取三升溫服一升旦服忌海藻菘菜治石淋方取附船底苔大如鴨子以一區半水煮取一區一服一升日三治石淋方浮石取滿一手搗為末以水三升苦酒一升煮取二升澄清溫服一升不過再三服石即便出治石淋神方車前子二升以絹囊盛以水八升煮取三升盡服之日移一丈石子當出宿不食飲之良又方生葎莖葉合搗取汁服一升日三小便不通及關格方取生土苽根搗取汁以少水解之於筒中吹納下部即通祕方治小便閉方豉半升水四升煮一沸去滓一服立愈通治小便不通方熬鹽令熱納囊中以尉少腹上卒小便不通及胞轉方車前草一斤水一斗煮取四升分四服
