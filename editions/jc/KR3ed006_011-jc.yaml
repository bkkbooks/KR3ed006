body:
  text: 卷第十一述用本草藥性味合則成毒未必即殺人即病也皆經久乃害耳唯見朝食至暮無害便謂書記非實甚可哀倉公述曰味合則成毒毒合則成藥未必即殺人及即病也皆經久乃害耳堇汁味甘寒無毒主馬毒瘡搗汁洗之並服之堇菜也倉公對黃帝曰大豆多食令人身重丹砂一名鎮粉燒硃砂作水銀上黑煙名也金牙一名黃石牙薯蕷一名土荼根一名茅荼根牛膝一名牛唇丹參一名逐馬人病腰痛服之則能起走逐馬故以名之天名精一名天精一名天無青酸漿一名苦薝子薺苨一名鹿隱忍根名也水蓱水中大馬蓱一名馬菜一名馬葉蝦蟆一名去甫一名苦蠪一名仇道蓬虆一名大莓礪石一名磨刀石牡蒙一名王孫涉釐水中粗苔也麥門冬垣衣為使防葵多服令人迷惑恍惚如狂
