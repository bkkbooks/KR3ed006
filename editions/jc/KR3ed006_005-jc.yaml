body:
  text: 卷第五要方第五卷所治如下丸散酒煎膏諸方治下利諸方治咳嗽諸方待考治上氣如奔豚諸方治心腹胸脅中病諸方治虛補養腎虛腰疼諸方治渴利諸方治風諸方治邪狂顛諸方上八件治下利諸方烏梅丸治雜下方第一下赤二下白三下黃四下青五下黑六固病下下如瘀赤血七久下八下不可止九連年下十卒下十一下少血數十二霍亂而下十三下如舍水十四下已則煩十五息下一作一止十六下而不欲食十七食無數但下者十八下但欲飲水十九重下二十雜錯不可名字合二十種下江夏太守以此法治是下盡愈方黃連一兩黃柏一兩熟艾一兩附子一兩甘草一兩乾薑二兩烏梅二十枚去核取肉熬之凡七物合搗下篩蜜和丸如大豆飲服十丸漸至二十丸日三青要結腸丸治熱毒下不絕不問久新悉治之方苦參橘皮阿膠炙獨活芍藥黃連藍青一方乾薑四分代鬼臼黃柏甘草各四分凡十物合搗下篩蜜烊膠和之並手捻作丸如梧子干以飲服十丸日三不知稍增姜附散治青下白下方乾薑附子炮皂莢炙去子上三味等分搗篩為散飲服方寸匕不過再服即愈亦可丸服治咳嗽諸方待考治上氣如奔豚諸方治手足逆冷胸滿氣促從臍左右起鬱冒者方桐君說伏出雞卵殼中白皮梨木灰麻黃去節紫菀各等分上四味搗下篩作丸散隨宜酒服十丸如梧子散者方寸匕治三十年喉中結氣咳逆立瘥也亦可水煮為湯以意分之治心腹胸脅中病諸方九痛丸主九種心痛一蟲心痛二注心痛三風心痛四悸心痛五食心痛六飲心痛七冷心痛八熱心痛九生來心痛方悉主之並治冷腫上氣落馬墮車方附子二兩巴豆仁一兩生狼毒一兩炙令極香抨人參一兩乾薑一兩食茱萸一兩六味蜜和空腹服如梧子三丸卒中惡腹痛口不言二日一服連年積冷流注心胸者亦服之好好將息神驗七氣丸治七氣七氣為病有寒氣怒氣喜氣憂氣恚氣愁氣熱氣此七氣為病皆生積聚堅牢如壞在腹中心痛煩怨不能飲食時去時來發作有時每發痛欲絕也其寒氣則吐逆心下脹滿其熱氣則慌惚悶亂常如眩冒失精其怒氣則不可當熱病上蕩心短氣欲絕不得息其恚氣則積聚心下不得食飲其喜氣則不可疾行久立其憂氣則不可苦作臥不安席其愁氣則怒忘置物四傍不復憶處四肢手足胕腫不得舉亦治產生早起中風余疾也大黃十分炮人參三分椒二分熬半夏三分熬烏頭五分熬桔梗三分細辛三分茱萸三分熬乾薑三分菖蒲三分茯苓三分芎藭四分紫菀三分甘草三分石膏三分柴胡三分桃仁三分凡十七物冶合下篩和以蜜酒服如梧子三丸日三不知稍增以知至十丸為度治虛補養腎虛腰疼諸方腎虛腰痛治之方牡丹二分去心萆薢三分白朮三分桂心三分上四味搗篩以酒服方寸匕日三亦可作湯服之忌生蔥胡荽桃李雀肉等治腰痛少氣陰弱寒冷小便清冷瀝滴陰下濕癢少腹急無子息方甘草十四分炙續斷三分麥門冬三分薯蕷三分附子三分炮乾薑二分棘刺四分上七味搗篩酒服方寸匕日三忌豬肉冷水海藻菘菜治腰痛皆積年痛者方乾地黃十分白朮五分乾漆五分桂心八分甘草五分炙上五味搗末以酒服方寸匕日三忌桃李雀肉生蔥海藻菘菜蕪荑等治卒腰痛不得俯仰方鹿角長六寸燒上一味搗篩為末以酒服方寸匕䐴腰疼方鱉甲一枚炙令黃刮削令淨潔上一味搗篩空腹以湯飲酒服方寸匕日三忌人莧菜治渴利諸方男子消渴飲一斗水小便亦得一斗宜八味腎氣丸主之神方消渴人宜常服之乾地黃八兩薯蕷四兩茯苓三兩山茱萸五兩澤瀉四兩牡丹皮三兩附子三兩炮桂心三兩上藥搗篩蜜和丸如梧子大酒下十丸少少加以知為度忌豬肉冷水蕪荑胡荽酢物生蔥栝蔞丸治日飲一石許小便不通方栝蔞三分鉛丹三分葛根三分附子一分凡四物冶下篩蜜丸如梧子飲服十丸日三鉛丹散治消渴止小便方鉛丹二分栝蔞十分澤瀉五分石膏五分赤石脂五分白石脂五分胡粉二分甘草十分凡八物冶下篩酒服方寸匕日三不知稍增年壯服半匕得病一年服藥一日愈二年二日瘥甚者夜以水服勿用酒治風諸方丹參膏治傷寒時行賊風惡氣方在外即肢節麻痛喉咽痹寒入腹則心急脹滿胸脅痞塞內則服之外則摩之並癱緩不隨風濕痹不仁偏枯拘屈口喎耳聾齒痛頭風痹腫腦中風動且痛若癰結核漏瘰癧堅腫未潰敷之取消及丹疹諸腫無頭欲狀骨疽者摩之令消及惡結核走身中者風水遊腫亦摩之其服者如棗核大小兒以意減之日五服數用之悉效丹參蒴藋各三兩莽草葉躑躅花各一兩秦膠獨活烏頭川椒連翹桑白皮牛膝各二兩十二物以苦酒五升油麻七升煎令苦酒盡去滓用如前法亦用豬脂同煎之若是風寒冷毒可用酒服若毒熱病但單服牙齒痛單服之仍用綿裹嚼之比常用豬脂煎藥有小兒耳後癧子其堅如骨已經數月不盡以帛塗膏貼之二十日消盡神效無比治邪狂顛諸方別離散治男子女子風邪男夢見女女夢見男交歡日久成勞悲愁憂恚怒喜無常日漸羸瘦連年歲月深久難治或半月或數月日復發者方楊上寄生三兩炙菖蒲細辛附子炮乾薑薊根天雄炮桂心各一兩白朮二兩茵芋二兩上十味合搗下篩以酒服半方寸匕日三不飲酒用童子小便調服合藥勿令婦人見之勿令病人見見者令邪氣不去禁之為驗忌生蔥生菜豬羊肉桃李雀肉餳等物治鬼魅四物鳶頭散方東海鳶頭是由跋黃牙石又名金牙莨菪防葵各一分上藥搗下篩以酒服方寸匕欲令病人見鬼增防葵一分欲令知鬼主者復增一分立有驗防葵莨菪並令人迷惑慌惚如狂不可多服治癲疾發作僵仆不知人言語妄見鬼方莨菪子三升清酒五升漬出曝乾復納汁盡曝乾搗冶末空腹服四分匕日三治卒癲疾癲狂莨菪散方莨菪子三升末之酒一升漬多日出搗之以向汁和絞去滓湯上煎令可丸服如小豆三丸日三口面當覺急頭中有蟲行者額及手足應有赤色處如此必是瘥候若未見服取盡矣
