body:
  text: 序經方小品一部連藥性灸法合十二卷古之舊方者非是術人逆作方以待未病者也皆是當疾之時序其源由診候之然後依藥性處方耳病者得愈便記所主治序為方說奏上官府仍為舊典也今之學者相與同難用舊方治病病如方說藥物依方而不悉驗者共論是病有古今不言異鄉殊氣質耐不同同病患痛癢所苦相似而得之根源實別異且人有苦樂強弱用藥不等而得差是同既差之後實各記其方所治神驗方說略同其藥寒溫補利乖背或先於嶺南服之得益傳往淮北為治反害夫用故方之家唯信方說不究藥性亦不知男女長少殊耐所居土地溫涼有早晚不同不解氣血浮沉深淺應順四時食飲五味以變性情唯見方說相應不知藥物隨宜而一概投之此為遇會得力耳實非審的為效也是以黃帝經教四海之民為治異品此之謂也今若欲以方術為學者當精看大品根本經法隨宜制方處針灸病者自非壽命應終毒害已傷生氣五勞七傷已竭氣血者病無不愈也若不欲以方術為學但以備身防急者當依方訣看此經方小品一部為要也今先記述上古已來舊方卷錄多少採取可承案者為小品成法焉華佗方有十卷張仲景辨傷寒並方有九卷而世上有不啻九卷未測定幾卷今且以目錄為正張仲景雜方有八卷黃素方有二十五卷葛氏所撰方有四卷阮河南所撰方有十五卷遼東都尉廣所撰備急方中古備急併合為二卷楊氏所撰方有九卷有雜撰方七卷有治下湯丸散方十卷有治婦人方十三卷有治少小雜撰方三十卷有治眼方五卷有雜膏方十卷範東陽所撰方有一百九卷是範安北過江後撰集也上十六件皆是秘閣四部書目錄所載錄者也羊中散所撰方有三十卷是元嘉中於新安郡所集皆是江東得效者於世乃可即用秦承祖所撰要方二十卷多是範東陽集中單省者耳且首數又少於次第治不得周悉不足傳也上二件並是元嘉中撰也一切諸貴家皆各自撰集服藥方也終歸是大集中事及術士所增損耳不可悉錄也謹案經傳撰古今經方治病舊典觀歷代相紹聖人雖異軌殊跡治化同源療病之理其教亦然是以神農使於草石黃帝施於針灸扁鵲徹見腑臟華佗刳割腸胃所為各異而治病則同是以為異軌同源者也歷代撰集文跡皆悉存而術有神人真氣藥有遊仙所餌方有延年益壽法有民間救急自古至今去聖久遠雅有其文無有傳授之者漢末有張仲景意思精密善詳舊效通於往古自此以來未聞勝者夫學術之驗皆依智慧開悟心意安審尋詳經法得其變通然後處方耳今所記前件諸名人所撰服藥余方卷數者非為治病悉應須如此多方也正是記錄開闢以來異軌同源歷代所集服藥余方隨積耳研尋治病終歸以藥為方本草藥族極有三百六十五種其本草所不載者而野間相傳所用者復可數十物而方集有數百卷卷有百餘首者皆是古之明術者詳經察病隨宜處方或藥物數同其稱分為異或煮取升合為變通耳疾愈方積歷代如此自然成多也後來學者例不案經多尋方說隨就增損其方首數既多藥物所殊至微或說同而方異或方同而說乖或先是老人服之得效今有少年病與之相似或是女子先病服之有益今有產婦病與之相似方說病證可服而人長少盛衰理異婦人女子氣血質殊且不看本草而相傳加藥其藥物雖是所宜而於本方更成相犯或欲除其煩重於本方便成不便一方積經增損轉生偽異其說雖與病會其藥物久改初始是以中古諸方用藥多有畏惡相犯反毒相觸良由此也今更詳諸古方撰取十卷可承案者又撰本草藥性要物所主治者一卷臨疾看之增損所宜詳藥性寒溫以處之並灸法要穴為一卷合為十二卷為經方小品一部以備居家野間無師術處臨急便可即用也僮幼始學治病者亦宜先習此小品則為開悟有漸然後可看大品也
