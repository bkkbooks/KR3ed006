心胸者亦服之好好將息神驗又方桃白皮煮汁空腹以意服之凡暴心痛面無色欲死方以布裹鹽如彈丸燒令赤置酒中消服之治兩脅痛方以熱湯浸兩手足冷又浸之七氣丸治七氣七氣為病有寒氣怒氣喜氣憂氣恚氣愁氣熱氣此七氣為病皆生積聚堅牢如壞在腹中心痛煩怨不能飲食時去時來發作有時每發痛欲絶也其寒氣則吐逆心下脹滿其熱氣則慌惚悶亂常如眩冒失精其怒氣則不可當熱病上蕩心短氣欲絶不得息其恚氣則積聚心下不得食飲其喜氣則不可疾行久立其憂氣則不可苦作臥不安席其愁氣則恕忘置物四旁不復憶處四肢手足跗腫不得舉亦治産生早起中風余疾也大黃十分炮人參三分椒二分熬半夏三分炮烏頭五分炮桔梗三分細辛三分茱萸三分熬乾薑三分菖蒲三分茯苓三分芎藭三分紫菀三分甘草三分石膏三分柴胡三分桃仁三分凡十七物冶合下篩和以蜜酒服如梧子三丸日三不知稍增以知至十丸為度治伏梁心積方銅器盛白馬尿一升旦旦服之妙治凡所食不消方取其餘類燒作末酒服方寸匕便吐去宿食即瘥陸光録說有人食桃有不消作病時已晚無復桃就樹間得槁桃子燒服之登吐出病即瘥治下利諸方黃連湯治春月暴熱解脫飲冷或眠濕地中冷腹痛下青黃汁疲極欲死方黃連四兩當歸三兩乾薑三兩厚朴二兩凡四物切以水七升煮取三升分三服治冷徹赤白滯下不斷變成赤黑血汁如爛魚腸腹痛枯瘦不能飲食方黃連四兩吳茱萸三兩當歸三兩石榴殼二兩凡四物以水三升漬黃連一宿明旦更加三升水煮取三升分三服治雜下方第一下赤二下白三下黃四下青五下黑六固病下下如瘀赤血七久下八下不可止九連年下十卒下十一下少血數十二霍亂而下十三下如舍水十四下已則煩十五息下一作一止十六下而不欲食十七食無數但下者十八下但欲飲水十九重下二十雜錯不可名狀合二十種下江夏太守以此法治是下盡愈方黃連一兩黃柏一兩熟艾一兩附子一兩炮甘草一兩乾薑二兩烏梅二十枚去核取肉熬之凡七物合搗下篩蜜和丸如大豆飲服十丸漸漸至二十丸日三青要結腸丸治熱毒下不絶不問久新悉治之方苦參橘皮阿膠炙獨活芍藥黃連藍青一方乾薑四分代鬼臼黃柏甘草各四分凡十物合搗下篩蜜煬膠和之並手捻作丸如梧子干以飲服十丸日三不知稍增久卒赤白下方燒馬屎一丸作灰分服酒水隨意服已試良治青下白下姜附散方乾薑附子炮皂莢炙去子上三味等分搗篩為散飲服方寸匕不過再服即愈亦可丸服治咳嗽上氣諸氣治咳嗽紫菀七味湯方紫菀半兩五味子一兩桂心二兩杏仁七十枚去皮尖兩仁碎乾薑四兩麻黃四兩去節甘草二兩炙上藥切以水九升前取二升半去滓溫服七合日三服忌海藻菘菜生蔥蒜面腥膩治咳生薑五味子湯方五味子五合生薑八兩紫菀一兩半夏二兩洗吳茱萸一兩款冬花半兩細辛一兩附子一枚炮茯苓四兩甘草二兩炙桂心一兩上十一味切以水一斗煮取五升分溫三服老人可服五合忌海藻菘菜豬肉冷水羊肉餳生菜醋物生蔥治咳逆喉中如水雞聲貝母湯方貝母甘草炙各二兩麻黃去節桂心各四兩半夏洗乾薑各三兩杏仁七十枚去尖皮兩仁者熬上七味切以水二斗三升先煮麻黃得十沸納藥煮取三升溫服七合日三忌海藻菘菜生蔥羊肉餳治咳而上氣咽中如水雞聲射干麻黃湯方射干十二枚麻黃去節生薑各四兩紫菀三兩款冬花三兩細辛三兩五味子半升半夏如大錢許八枚洗大棗七枚擘上九味切以東流水一斗二升煮取三升分三服忌羊肉餳生菜治咳嗽上氣呼吸攀繩肩息欲死覆杯湯方麻黃四兩甘草二兩乾薑二兩桂肉二兩貝母二兩凡五物以水八升煮取二升再服即愈沃雪湯治上氣不得息臥喉中如水雞聲氣欲絶方麻黃四兩細辛二兩五味子半升乾薑四兩半夏四兩桂心一兩凡六物以水一半煮取三升分服一升投杯即得臥一名投杯湯令得汗汗多喜不得眠汗者一服消息後服治氣逆如奔豚狀並諸湯方黃帝問金冶子曰驚為病如奔豚其病奈何金冶子對曰驚為奔豚心中踴踴如車蓋驚人所恐五臟不定食飲輒嘔氣滿胸中狂癡欲走閉眼謬言開眼妄語或張面目不相取與衆師不知呼有所負奔豚湯主之黃帝曰善黃帝問金冶子曰憂思奔豚何以別之金治子對曰憂思奔豚者氣滿支心心下煩亂不欲聞人入聲發作有時乍差乍劇吸吸短氣手足厥逆內煩結痛溫溫欲嘔衆師不知呼有觸忤奔豚湯主之黃帝曰善師曰病如奔豚者氣從少腹起上衝喉咽發作欲死復還生皆從驚恐得之腎間有膿故也師曰病有奔豚有吐膿有驚怖有火邪此四部病者皆從驚發得之火邪者桂枝加龍骨牡蠣湯主之若新亡財為縣官所捕迫從驚恐者治用鴟頭鉛丹復余物未定所言奔豚者病人氣息逆喘迫上如豚奔走之狀奔豚湯主之治卒傷損食下則覺胸中偏痛栗栗然水漿下亦爾問病與相應急作此方生李根一斤細銼之麥門冬一升去心人參二兩桂心二兩甘草二兩炙上五味㕮咀以水一斗煮取三升分三服忌海藻菘菜生蔥奔豚湯治虛勞五臟氣之損遊氣歸上上走時若群豚相逐憧憧時氣來便自如坐驚夢精光竭不澤陰痿上引少腹急痛而乍熱赤色喜怒無常耳聾目視無精光方葛根八兩乾者生李根切一升人參三兩半夏一升洗芍藥三兩當歸二兩桂心五兩生薑二片甘草炙二兩上九味切以水二斗煮得五升溫服八合日三不知稍增至一升日三忌羊肉餳生蔥海藻菘菜等所言如奔豚之狀者是病人氣如豚奔走氣息喘迫上逆之狀也湯方用奔豬者謂雄豚豭斗子是先逐之使奔之然後殺取血及臟合藥也葛根奔豚湯方葛根八兩乾者生李根一升去皮人參三兩術二兩半夏一升洗炙芍藥三兩當歸二兩桂肉五兩生薑一斤甘草二兩凡十物以豚汁二斗煮得五升溫服八合日三牡蠣奔豚湯治奔豚氣從少腹起沖胸手足逆冷方牡蠣三兩熬桂心八兩李根白皮一斤切甘草三兩炙上四味切以水一斗七升煮取李根皮得七升去滓納余藥再煮取三升分服五合日三夜再忌生蔥海藻菘菜治手足逆冷胸滿氣促從臍左右起鬱冒者奔豚湯方甘草四兩炙李根白皮一斤切葛根一斤黃芩三兩桂心二兩栝蔞二兩人參二兩芎藭一兩上八味切以水一斗五升煮取五升去滓溫服一升日三夜再忌海藻菘菜生蔥又方桐君說伏出雞卵殼中白皮梨木灰麻黃去節紫菀各等分上四味搗下篩作丸散隨宜酒服十丸如梧子散者方寸匕治三十年喉中結氣咳逆立瘥也亦可水煮為湯以意分之治虛滿水腫諸方治水腫大豆湯方大豆三升上一味以水六升煮令熟出豆澄汁更納美酒五升微火煎如餳服一升漸增之令小下桃皮酒治水腫方桃皮三斤剝去上黑皮取里黃皮女曲一升秫米一升上三味以水三斗煮桃皮令得一斗以五升汁漬女曲五升汁蒸飯釀如酒法熟漉去滓可服一合日三耐酒者增之以體中有熱為候小便多者即是病去便愈忌生冷酒面一切毒物麝香散治水腫方麝香三銖芫花三分熬甘遂三分上三味合下篩酒服錢半邊匕老小錢邊三分匕亦可丸服之強人如小豆十丸老人五丸治水腫商陸膏方商陸根一斤生者豬膏一斤先煎可有二升上二味合煎令黃去滓以摩腫亦可服少許忌犬肉小女曲散治利後虛腫水腫者服此藥小便得利止腫亦消方女曲一升生用乾薑細辛椒目附子炮桂心各一兩上六味為散酒服方寸匕不知服二三匕日三産後虛滿者大良忌豬肉生蔥生菜麻黃甘草湯治皮中湧水面目身體虛腫方麻黃去根節二兩甘草一兩上㕮咀三錢水一杯煮麻黃五沸納甘草八分煎服汗出慎風冷有人患氣促積久不瘥遂成水腫服之效此治表實老人和虛人不可用之宜詳十水丸治水腫方腫從頭起名為白水其根在肺椒目主之腫從胸起名為黃水其根在脾甘遂主之腫從面起名為青水其根在肝大戟主之腫從腹起名為氣水乍實乍虛其根在腸芫花主之腫從股起名為黑水其根在腎玄參主之腫從面起至足名為懸水其根在膽赤小豆主之腫從內起堅塊四肢腫名為石水其根在膀胱桑根主之腫從四肢起腹腫名為風水其根在胃澤漆主之腫從腹起名為冷水其根在小腸巴豆主之腫從胸中起名為赤水其根在心葶藶主之上十種隨其病始所在增其所主藥皆一分巴豆四分去心皮冶末合下篩蜜丸服如梧子三丸得下為度不下日三亦可作散末食服半錢匕大便利明朝復服如法再服病愈即禁飲食但得食於魚耳十水散治水腫方先從腳腫名曰清水其根在心葶藶子主之先從陰腫名曰勞水其根在腎澤漆主之先從腹腫名曰冷水其根在大腸蜀椒主之先從面目腫名曰氣水其根在肺桑根主之先從手足腫名曰心水其根在小腸巴豆主之先從口唇腫名曰黃水其根在胃大戟主之先從脅腫名曰飲水其根在肝芫花主之先從腰腫名曰肝水其根在膈甘遂主之先從胸腫名曰石水其根在脾茯苓主之先從背腫名曰鬼水其根在膽雄黃主之上十物分等主十水隨腫所從始案方偏加藥二分合搗下篩空腹以水服方寸匕當下水多者減服下少者益之蔥豆洗湯治虛熱及石熱當風露臥冷濕傷肌熱菹在裡變成熱風水病心腹腫滿氣急不得下頭小便不利大便難四肢腫如皮囊盛水晃晃如老蠶色陰卵堅腫如斗莖腫生瘡如死鼠此皆虛損腎中有熱強取風冷濕損脾胃故也納依方服諸利水藥外宜以此湯洗四肢竟以蔥豆膏敷之別以豬蹄湯洗陰莖瘡爛處及卵腫也蔥合青白切一升蒺藜子一升舂碎赤小豆一升菘菜子一升舂碎蒴藋切五升巴豆一百枚合心皮打碎上六物以水一石二斗煮取八斗以淋洗身腫處蔥豆膏豬蹄湯方在本方葶藶子回神酒治風水通身洪腫肉如裂者服之小便利自隨消方春時釀清酒五斗一方五升葶藶子三升熬著酒中漬再宿便服一合以漸增之病去小便利腫自消滅及縮也神良有驗若不得春酒余極好酒亦佳水腫尿泣用烏犍牛尿半升空腹飲小便利良
