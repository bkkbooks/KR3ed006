body:
  text: 卷第一述增損舊方用藥犯禁決經說合藥慎勿合相反畏惡相殺者不能除病反傷人命檢舊方相犯者甚多今依方用之乃未見有入口即斃者凡服犯禁忌藥亦恐病不即除久遠潛為害也如反藥禁所說以相對者服之即甚耳諸方既合雜多物其勢應小微故得不即斃也經說藥物有陰賊者令人羸瘦陰痿短氣傷壞五內夫服相反畏惡之藥雖不即斃然久遠潛害亦可如此豈可不避者焉尋古之處方皆當明審經禁不應合其相反畏惡也恐特是野間山郡官典醫輩相傳以意增損故有犯禁藥耳凡病自有外候危急而反易瘥者服一方即瘥亦有不治自若瘥者與此相會便稱方神驗相承推之為舊方皆不卻除其犯禁藥物而服之其實不能除病也且輕命者多不信脈亦云診脈是精妙之術非不博者所能解不至辨之士所能究亦相承見經方是官典醫所執傳便謂其道卑賊非君子所看委之典醫亦云醫者意也便宮中相傳用藥不審本草藥性仍決意所欲以加增之不言醫者意也為多意之人意通物理以意醫物使惡成善勿必是治病者也故經傳云上醫醫國中醫醫民下醫醫病此之謂也黃帝矜於蒼生立經施教教民治病非但慈於疾苦亦以以強於國也寒食大散難將息者由栝蔞惡乾薑故也夫服此藥者皆是虛冷之人也虛冷為患其疾多端有患咳嗽上氣積年者宜除栝蔞用紫菀二兩代之積服兩劑無不皆瘥也若患腳弱冷痹緩弱者以石斛二兩代之栝蔞也為治甚效且無險忤以為良決也其餘衆病但除去栝蔞而已若虛熱渴利痔血夢泄及婦人崩中不宜服此藥也寒食方有美說甚多其有不可盡從者也大理宜知此決也茯苓惡白蘞而鎮心丸用之茯苓主憂恚驚怒恐悸心下結痛是鎮心所宜也白蘞治癰腫心驚癇不如茯苓今宜除白蘞也麻子惡茯苓而骨填煎用之麻子主補中益氣復血脈破石淋若疾源須此治者留麻子去茯苓若心下結痛憂恚驚怒恐悸者去麻子用茯苓也紫菀惡遠志而補心湯用之遠志主傷中補不足益智慧補心宜用遠志若患咳嗽上氣者可以余主咳藥代遠志用紫菀也牛黃惡龍骨而治小兒方用之若下利者可去牛黃留龍骨若壯熱驚癇者宜去龍骨留牛黃也芍藥惡芒硝而治小兒方用之芍藥主益氣止邪氣腹痛作優利除堅積聚耳須此治者當去芒硝用芍藥若壯熱結寒實毒氣者可留芒硝去芍藥也乾薑惡黃連而斷下利方悉用之若暴冷下者可以吳茱萸代乾薑也夫是久寒積冷有飲水者服茱萸喜先下飲水去然後下止耳大理宜知如此也烏頭與半夏相反而諸湯皆用之烏頭主中風灑灑惡寒濕痹積聚咳逆上氣須此治者留烏頭去半夏若患傷寒寒熱喉痹咽痛胠胸脹咳逆心下結堅當用半夏大都此二物為治相似會宜去一種也藜蘆與細辛人參相反而烏頭丸用之藜蘆主殺蠱毒諸蟲除咳逆腸澼下利若須此治者留藜蘆去細辛人參若患久風風頭肢節痛心神虛者去藜蘆留細辛人參也藜蘆惡大黃而露宿丸用之大黃主調中破除諸積聚須此治者留大黃除藜蘆也若須藜蘆為治者宜除大黃也礜石惡細辛而附子丸用之礜石主寒熱鼠痿蝕瘡死肌肉痹腹中積聚結堅令人發熱若須此治者留礜石去細辛若患風痹拘攣緩弱膝痛咳逆堅瘕積聚者可除礜石留細辛也防己惡細辛而治風湯悉用之防己主中風傷寒溫瘧灑灑寒熱諸癇利大小便若須此治者可留防己去細辛若患風頭頭眩痛四支諸痛者可留細辛去防己也厚朴惡澤瀉而前胡丸用之厚朴主中風傷寒頭痛寒熱驚氣死肌血痹去三蟲若須此治者留厚朴去澤瀉若須補養益氣力者留澤瀉去厚朴也皂莢惡人參而通草丸用之皂莢主風痹死肌風頭淚出利九竅下水氣殺精物魔鬼咳逆上氣須此治者留皂莢去人參若須補五臟安精神者留人參去皂莢也礬石惡牡蠣而卻煩丸用之礬石主瘡蝕及咽痛堅齒骨須此治者留礬石去牡蠣若患傷寒寒熱溫瘧洗洗惡寒憂恚驚怒氣結心痛鼠瘻女子去赤白浚下血者留牡蠣去礬石也當歸惡䕡茹而治瘡方用之當歸主咳逆上氣溫瘧寒熱洗洗在皮膚中婦人漏下絶孕諸瘡痙金瘡痛須此治者用當歸若欲食惡肉殺蟲者用䕡茹也甘草反海藻甘遂大戟芫花凡四物亦反甘草而諸湯皆用之甘草不只治病宜是通部制百藥耳須此四物為治者除甘草用犀角屑亦佳上前件舊方用藥犯經禁者略見凡十七條其所不見者甚多若看方有所見便應依此決卻除之然後可服耳藥性要物亦已甲乙注名也故復重記述之大法宜知此決也述舊方合藥法合湯用半夏先稱量然後洗令去滑也合丸散皆炮之如三建法削去焦皮也合湯丸散酒用烏頭附子天雄法皆熱灰中炮令坼削去焦皮也合湯藥用麻黃者皆先折去節然後稱之當先煮斷取沫不去節與沫令人咳合湯用桂厚朴黃柏諸木皮者皆削去外粗皮也合藥用巴豆者剝皮去心熬令紫色用巴豆多於余藥不可下篩者皆別冶如脂以冶散中更舂令調然後與蜜也用少者可合舂之合藥用杏仁皆湯漬剝去皮核中有雙仁者不可用也合丸散多不可篩者亦別冶令如脂以散合冶之合藥用石葦者皆以湯漬刮洗去外黃毛也不去毛令人反淋石藥合湯酒者細舂之為末綿絹裹煮之合湯用膠炙令焦沸如浮石狀也煮湯半熟內之令消盡合湯用膠糖蜜臘膏類髓者皆成湯內煬令和調也合湯用血及酒者皆熟納之然後絞取湯也附子一枚者以重三分為準也甘草一尺者若數寸者以頭徑一寸為準也去赤皮炙之令不吐桂一尺若數寸者以厚二分廣六分為準也麻黃一束者一把者一握者並以三兩為準也厚朴一尺及數寸者以厚三分廣一寸為準也黃柏一片者以重二兩為準也人參一枚者以重二分為準也生薑乾薑纍數者以一支為準也用艾及葉物一莒者輕重二升為准也方寸匕散者作丸准梧子十枚也二大豆多可准一刀圭也四刀圭以准一撮也服湯云一杯者以三合酒杯子為準也上舊方上分齊自有不注明者合之便應依此法也述看方及逆合備急藥決尋百病之生違和共緩急理殊救治不同緩者年月乃劇急者不延時即劇緩者久而自瘥急者不救即殞或有見藥欲服未詳之頃而致逝者此比甚衆尋方學之要以驗速為貴夫欲執術者皆宜善識暴卒病侯看方宜先解救急要說次精和緩末詳輔衛此則要矣是以官府有成合見藥者以備倉卒也凡多口數家亦宜其然也夫病之根源有風有寒有冷有熱有濕有勞有損有傷有醉酒有飲食有驚怖恐懼怵惕憂恚有産乳落胎捥墮吐下去血有貪餌五石皆為病之根源也為患生諸枝條耳既不脈之本不知根源也但問人男女長少依方說方說有半與病相會便可服也宜有增損者一依藥性也凡病劇者人必弱人弱則不勝藥處方宜用分兩單省者也病輕者人則強勝於藥處方宜用分量重復者也凡久病者日月已積必損於食力食力既弱亦不勝藥處方宜用分量單省者也新病者日月既淺雖損於食其穀氣未虛猶勝於藥處方亦宜用分兩重復者也少壯者病雖重其人壯氣血盛勝於藥處方宜用分兩重復者也雖是優樂人其人驟病數服藥則難為藥勢處方亦宜如此也衰老者病雖輕其氣血衰不勝於藥處方亦宜用分兩單省者也雖是辛苦人其人希病不經服藥者則易為藥勢處方亦宜如此也夫人壯病輕而用少分兩方者人盛則勝於藥勢方分兩單省者則不能制病雖積服之其勢隨消終不制病是以宜服分兩重復者也夫衰老虛人久病病重而用多分兩方者人虛衰氣力弱則不堪藥藥未能遣病而人氣力先疲人疲則病勝便不敢復服則不得力也是以宜服分兩單省者也女子婦人其治異品女子年十六以上則有月病其是月病來日得風寒冷濕四時之病相協者皆應自說之不爾治相觸會便致增困也處方者亦應問之是月病來限有他疾者其方在婦人方卷上其是凡曰有疾者故同餘人方耳江西江北其地早寒寒重於江東令人陽氣早伏內養腎氣至春解亦晚腠理閉密外不受邪濕故少患腳弱上氣無甚毒螫也江東嶺南晚寒寒輕令人陽氣不伏腎氣弱且冬月暖熏於肌膚腠理開疏而受邪濕至春解陽氣外泄陰氣倍盛於內邪濕乘之故多患上氣四肢痿弱及溫瘧發黃多諸毒螫也凡用諸方欲隨土地所宜者俱是治一冷病共方用溫藥分兩多者宜江西江北用溫藥分兩少者宜江東嶺南也所以方有同說而異藥者皆此之類也經方小品有十二卷所治皆周遍衆病也其中祕要者是第六一卷治四時之病周員終竟四時無究終極為最要也夫病有重疢而不妨氣力食飲而行走如常者自有休強人小病便妨食飲眠臥致極者其中有輕者消息自瘥服湯不過一兩劑而瘥者也小重者二月卅日可瘥者既不解脈得病之始亦無以得知其應經一月卅日也唯望五日三日得瘥耳亦不可日日服湯也自有病源已除而人氣力未展平復者正宜消息者五三日中乃復依所宜投湯耳自有小盛之人不避風涼觸犯禁忌暴竭精液雖得微疾皆不可輕以利藥下之一利便竭其精液因滯著床席動經年歲也初始皆宜與平藥治也宜利者乃轉就下之耳唯小兒不在此例大法宜如此也夫長宿人病宜服利湯藥者未必頓盡一劑也皆視其利多少且消息之於一日之寬也病源未除者明後更合一劑不必服盡但以前後利勢相成耳氣力堪盡劑者則不制也病源宜服利藥治取除者服湯之後宜將丸散也時時服湯助丸散耳夫病是服利湯得瘥者從此以後慎不中服補湯也得補病勢即還覆成也重就利之其人則重弊也若初瘥氣力未展平復者當消息之宜服藥者當以平和藥逐和之也若垂平復欲將補益丸散者自可以意量耳夫有常患之人不妨行走氣力未衰欲將補益冷熱隨宜丸散者乃可先服利湯下便除胸腹中瘀積痰實然後可將補藥復有虛人積服補藥或中實食為害者可止服利藥除之復有平實之人暴虛空竭者亦宜以微補藥止以和之而不可頓補也暴虛微補則易平也過補喜痞結為害也夫極虛極勞病應服補湯者風病應服治風湯者此皆非五三劑可知也自有滯風洞虛積服數十劑及至百餘劑乃可瘥者也然應隨宜增損之以逐其體寒溫澀利耳要方第一卷所治如下調三焦諸方治胸痹諸方治胸脅痰冷氣滿諸方治心腹脹滿冷痛諸方治下利諸方治咳嗽上氣諸方治氣逆如奔豚狀並諸湯方治虛滿水腫諸方上七件治胸痹諸方橘皮湯治胸痹方胸痹之候胸中愊愊如滿噎塞習習如癢喉中澀唾燥嘔沫是也橘皮一升枳實三兩生薑半斤上三物以水五升煮取二升分再服栝蔞子湯治胸痹方栝蔞子一枚枳實三兩半夏四兩洗薤白三斤凡四物以水一斗煮取四升分四服日三夜一治胸脅痰冷氣滿諸方通氣湯主胸脅滿氣噎方半夏八兩洗生薑六兩桂肉三兩吳茱萸三十枚凡四物以水八升煮取三升分三服半夏麥門冬湯治胸滿短氣方半夏一升洗麥門冬一升生薑八兩桂肉二兩蔥白一虎口白蜜二合淡竹葉一虎口甘草一兩凡八物切以水一斗煮取三升分三服茱萸湯治胸中積冷心下痰水煩滿汪汪不下飲食心胸應背欲痛方生薑五兩人參一兩半夏三兩洗桂肉三兩吳茱萸三兩大棗三十枚甘草一兩炙凡七物以水九升煮取三升納白蜜五合分三服生薑湯治中冷失聲及服諸冷物食冷心下強痛或上氣方生薑一升半夏五兩洗附子二兩炮吳茱萸三百枚凡四物以水五升煮取二升半分三服半夏橘皮湯治胸中冷痰氣滿不欲食飲方半夏五兩洗橘皮二兩桂肉四兩茯苓三兩人參一兩白朮三