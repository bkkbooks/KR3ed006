body:
  text: 卷第八要方第八卷所治如下治少小百病諸湯方治少小疾病諸丸散衆方治少小百病薄㩉洗浴膏散針灸諸方法上三件治少小百病諸湯方凡人年六歲以上為小十六以上為少三十以上為壯五十以上為老其六歲以下經所不載所以乳下嬰兒有病難治者皆為無所承據也中古有巫妨者立小兒顱囟經以占夭壽判疾病死生世相傳授始有小兒方焉兒新生出腹先以指斷口中惡血去之便洗浴斷齊竟𧚭袍訖未與朱蜜也取甘草如手中指一節許打碎以水二合煮取一合以綿纏沾取與兒吮之如朱蜜法連吮計可得一蜆殼入腹止兒當快吐吐去胸中惡汁也吐後消息計如飢渴頃復更與之若前服及更與並不吐者但稍與盡此一合止得吐惡汁令兒心神智慧無病都不吐者是不含惡血者勿復與之小兒初生三日可與朱蜜方令兒鎮精神魂魄真珠精煉研者如大豆多以赤蜜一蜆殼和之以綿纏沾取與小兒吮之得三沾止一日令盡此一豆多耳作三日與之則用三大豆多也不宜多多則令兒脾胃冷腹脹朱蜜與竟即可與牛黃牛黃益肝膽除熱定驚辟惡氣也作法如朱蜜多少一法同也凡初生兒其口中舌上有白物如米屑名為鵝口及鼻外亦有此由兒在胞中之時其母嗜嚼米使之然也此物當時不去之兒得吞者化為蟲也宜便去之治之方以發纏叉頭沾井花水撩拭之三四旦如此便脫去也猶不去者可煮栗蒺汁令濃以拭如上法若春冬無栗蒺者可煮栗樹皮用如上法皆良一云叉頭著在者屠蘇水中勿令兒口中落入吞兒初生之時有口中吞下膜如石榴子中隔者連其舌下名之連舌當時不擲斷者後喜令兒言語不發轉舌也治之方可以爪擲斷之微有血出無害若血出不止者可燒發作末敷之血止良乳母者其血氣為乳汁也五情善惡血氣所生也乳兒者皆宜慎喜怒夫乳母形色所宜其候甚多不可悉得今但令不狐臭癭瘤腫癭氣味蝸蚧癬瘙白禿癘瘍瘎唇耳聾鼽鼻癲眩無此等病者便可飲兒也師見其故灸盤便知其病源也治小兒宿食不消發熱九味當歸湯方當歸甘草炙芍藥人參桂心黃芩乾薑各一分大棗五枚大黃二分上藥切以水一升半煎取六合去滓分服增減量之治少小咳嗽腹脹七物小五味子湯方五味子碎紫菀各二分黃芩甘草炙麻黃去節生薑桂心各一分上藥㕮咀以水一升煮取七合分五服忌如常法治少小十日以上至五十日卒得暴咳吐乳嘔逆晝夜不得息四物湯方桔梗紫菀各三分甘草一分炙麥門冬七分去心上藥切以水一升煮取六合去滓分五服以瘥為度治小兒中冷及傷寒暴咳嗽或上氣咽喉鳴氣逆者或惡寒鼻塞清水出紫菀湯方紫菀杏仁去皮尖甘草炙黃芩麻黃去節橘皮桂心青木香當歸各一兩大黃三分上十味切以水三升煮取九合去滓一歲以上至五歲兒以意量之分服治小兒小便不通地膚子湯方地膚子一分瞿麥冬葵子各二分知母黃芩豬苓海藻橘皮升麻通草各一分半大黃八分上十一味切以水二升煮取一升大小多少量與服忌如常法治少小夏月藥大下後胃中虛熱渴唯可飲麥門冬湯方麥門冬去心甘草炙各四分枳實炙黃芩人參各三分龍骨六分上六味切以水二升煮取九合去滓分溫服治少小未滿百日傷寒身熱衄嘔逆五味麥門冬湯方麥門冬去心石膏寒水石各三分甘草二分炙桂心一分上藥切以水一升煮取八合分服效治少小小便不利莖中痛欲死方牛膝大把無多少煮作飲飲之立愈有驗治小兒客忤方吞麝香如大豆立愈又方取熱馬矢一丸絞取汁飲兒下便愈又方取衣中白魚十枚末以塗母乳頭令兒飲之入咽即愈治小兒數歲不行方取棗哺之日三便起治小兒誤吞鐵珠子如貍豆大者經年不以為害後病瘦瘠食不生肌膚時下痢或寒熱服諸藥自治來反劇不效有師診之云是吞物不消作法服衆藥所吞物不去終不瘥令其家中察之云兒近歲常弄十六具鐵珠覺失一顆慮是吞之從來積歲實不以為疑之師六診乃信是故令病矣為處湯藥所患即瘥復與將治其兒肌膚充悅而忘說其方具記之又有一家女子六七歲許患腹痛其母與摩按之覺手下有一橫物在兒肉裡正平橫爾問兒曰那得針在肉中大驚怪脫衣看之肉完淨無有刺處按之兒亦不患針痛惟覺腹裡痛耳其母即以爪甲重重介之乃橫物折爪下兩段亦不偏痛迎師診之共察若吞針刺物者其嬰兒時不經鯁礙惟恐養兒時母常帶針裸抱橫兒體針入兒肌膚中兒縱覺痛啼呼與乳臥息便止遂成不覺今因腹痛摩之知耳鐵得土木濕皆生屑易朽針在人肉中經數歲肉得血氣皆朽也故介之即折令患腹痛不安但治腹痛服溫中湯下心腹痛瘥後長大嫁因産乳不聞道針處為患故記之治少小疾病諸丸散衆方治小兒夜啼一物前胡丸方前胡隨多少上一味搗篩蜜丸如大豆服一丸日三加至五六丸以瘥為度又方以妊娠時食飲偏有所思者以哺兒則愈治少小夜啼至明即安寢夜輒啼芎藭散方芎藭二分術二分防己二分凡三物搗下篩二十日兒未能服散者以乳汁和之服如麻子一丸兒大能服散者服之多少以意節度治四五歲兒因食及在胎中宿熱乳母飲食粗惡辛苦乳汁不起兒哺不為肌膚心腹痞滿痿黃瘦瘠四肢痿躄繚戾服之令充悅方芍藥十分炙令黃黃耆鱉甲炙人參各四分柴胡八分茯苓六分甘草炙乾薑各二分如熱以枳實代上八味搗篩蜜和為丸如大豆服五丸日二服忌如常法治少小咳嗽晝瘥夜甚初不得息不能復啼四物款冬丸方款冬花紫菀各一兩半伏龍肝一分桂心二分上藥搗篩蜜和如泥取如棗核大塗乳頭令兒飲之日三治少小熱痢不止梔子丸方梔子仁七枚黃連五分黃柏三分炙礬石四分燒大棗四枚炙令黑上五味末之以蜜丸空腹服小豆許七丸瘥如未除更服忌如常法治少小壯熱渴痢八味龍骨散方龍骨研甘草炙赤石脂寒水石大黃石膏桂心栝蔞各三分上藥搗散以水及酒五合煮取二合量大小分服之效治小兒盜汗方麻黃根三分故扇燒作屑一分冶合乳汁飲三分匕大人方寸匕日三治少小淋瀝形羸不堪大湯藥者枳實三兩炙篩兒三歲以上服方寸匕兒小以意稍服之有驗牡丹散治頽偏大氣脹方牡丹防風桂心豉熬鐵精分等合搗下服方寸匕小兒一刀圭二十日愈大良嬰兒以乳汁和如大豆與之治少小百病薄㩉洗浴膏散針灸諸方法治少小齒落不生方取牛屎中大豆二七枚小開頭皮小許以次注齒根數度即當生又方取雌鼠屎二七枚以一枚試齒根處盡此止二十一日齒當生雌鼠屎頭尖是也治小兒口爛瘡方取羊乳細細瀝口中不過三度瘥治小兒舌上瘡方烏賊魚骨燒末以雞子黃和塗之至喉咽舌下遍敷即瘥止治小兒唇腫及口赤生白瘡爛方清旦研桑木白皮取汁以塗兒唇口即瘥治小兒重舌方以赤小豆屑酒和敷舌上又方燒亂髮作末敷舌上良又方用以栗哺之良小兒刺懸癰方可以綿纏長針末刃如粟以刺決之令氣泄之去清黃血汁良一刺止之消息一日不消又刺之不過三刺自消治小兒蓐內赤眼方生地黃薄切冷水浸以貼之妙又方取羊子肝薄切以井花水浸以貼之妙又方取黃柏以乳浸點之治小兒解顱方蟹骨白蘞各二分凡二物下篩以乳汁和塗上立愈治小兒頭不生髮方揪菜中心無多少搗絞取汁塗頭上治小兒白禿方搗揪菜中心取汁以塗頭立生治小兒丹毒方水中苔搗敷之又方芒硝納湯中取汁拭上治小兒瘑瘡方豬牙車骨年久者捶碎炙令髓出熱取塗之馬骨燒灰和油敷小兒耳瘡頭瘡陰瘡瘭疽有漿如火灼敷乳頭飲兒止夜啼治少小陰頽白頭翁敷之神效方生白頭翁根不問多少搗之隨偏處以敷之一宿當作瘡二十日愈治小兒頽方先將兒至碓頭祝之曰坐汝令兒某甲稱兒名陰頽也故灸汝三七一灸訖便牽小兒令莖以下向碓囊縫當陰以所著處灸縫上七壯日可消有驗又左右髀直行灸所極皆四處隨年壯又方小兒騎碓軸前齊陰莖頭前灸有年壯又云葛氏方但灸其土又方灸莖上向小腸脈又方灸手小指頭七壯隨瘥左右也治小兒盜汗方黃連三分貝母二分牡蠣二分凡三物粉一升合搗下篩以粉身治少小身熱李葉湯方李吐無多少咀㕮以水煮去滓浴兒避目及陰處玄中記曰天下有女鳥一名姑獲又名釣星鬼也喜以陰雨夜過飛鳴徘徊人村裡喚得來也是鳥淳雌無雄不産喜落毛羽於庭中置入兒衣中便使兒作癇必死即化為其兒也是以小兒生至十歲衣裳不可露七八月尤忌之
