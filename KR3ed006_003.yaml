body:
  text: 卷第三要方第三卷所治如下治渴利諸方治虛勞諸方治夢泄諸失精衆方治多汗諸方治百病後虛煩擾不得眠諸方上五件治渴利諸方論曰消渴者原其發動此則腎虛所致每發即小便至甜醫者多不知其疾所以古方論亦缺而不言今略陳其要按洪範稼穡作甘以物理推之淋餳醋酒作脯法須臾即皆能甜也足明人食之後滋味皆甜流在膀胱若腰腎氣盛則上蒸精氣氣則下入骨髓其次以為脂膏其次為血肉也其餘別為小便故小便色黃血之餘也臊氣者五臟之氣咸潤者則下味也腰腎既虛冷則不能蒸於上穀氣則盡下為小便者也故甘味不變其色清冷則肌膚枯槁也猶如乳母穀氣上泄皆為乳汁消渴疾者下泄為小便此皆精氣不實於內則便羸瘦也又肺為五臟之華蓋若下有暖氣蒸即肺潤若下冷極即陽氣不能升故肺干則熱故周易有否卦乾上坤下陽阻陰而不降陰無陽而不升上下不交故成痞也譬如釜中有水以火暖之其釜若以板蓋之則暖氣上騰故板能潤也若無火力水氣則不上此板終不可得潤也火力者則為腰腎強盛也常須暖將息其水氣即為食氣食氣若得暖氣即潤上而易消下亦免乾渴也是故張仲景云宜服此八味腎氣丸並不食冷物及飲冷水今亦不復渴比頻得效故録正方於後耳凡此疾與腳氣雖同為腎虛所致其腳氣始發於二三月盛於五六月衰於七八月凡消渴始發於七八月盛於十一月十二月衰於二月三月其故何也夫腳氣者擁疾也消渴者宣疾也春夏陽氣上故擁疾發即宣疾愈也秋冬陽氣下故宣疾發即擁疾愈也審此二者疾可理也又宜食者每間五六日空腹一食餅以精羊肉及黃雌雞為臛此可溫也若取下氣不食肉菜食者宜煮牛膝韭蔓菁又宜食雞子馬肉此物微擁亦可療宣疾也擁之過度便髮腳氣猶如善為政者寬以濟猛猛以濟寬隨事制度使寬猛得所定之於心口不能言也又庸醫或令吃栝蔞粉往往經服之都無一效又每至椹熟之時取爛美者水淘去浮者餐之候心胸間氣為度此亦甚佳生牛乳暖如人體渴即細細呷之亦佳張仲景云足太陽者是膀胱之經也膀胱者是腎之腑也而小便數此為氣盛氣盛則消穀大便硬衰則為消渴也男子消渴飲一斗水小便亦得一斗宜八味腎氣丸主之神方消渴人宜常服之乾地黃八兩薯蕷四兩茯苓三兩山茱萸五兩澤瀉四兩牡丹皮三兩附子三兩炮桂心三兩上藥搗篩蜜和丸如梧子大酒下十丸少少加以知為度忌豬肉冷水蕪荑胡荽酢物生蔥說曰少時服五石諸丸散者積經年歲人轉虛耗石熱結於腎中使人下焦虛熱小便數利則作消利消利之病不渴而小便自利也亦作消渴消渴之疾但渴不利也又作渴利渴利之病隨飲小便也又作強中病強中病者莖長興終不痿溺液自出亦作癰疽之病凡如此等宜服豬腎薺苨湯制其腎中石勢將餌鴨通丸便瘥也豬腎薺苨湯豬腎一具大豆一升薺苨石膏各三兩人參茯神一作茯苓磁石綿裹知母葛根黃芩栝蔞根甘草各二兩上十二味㕮咀以水一斗五升先煮豬腎大豆取一斗去滓下藥煮取三升分三服渴乃飲之下焦熱者夜輒合一劑病勢漸歇即止鴨通湯方白鴨通五升沸湯二斗半淋之澄清取二斗汁麻黃八兩豉三升冷石二兩甘草五兩石膏三兩梔子仁二十枚上六味㕮咀以鴨通汁煮六升去滓納豉三沸分服五合若覺體冷小便快闊其間若熱猶盛小便赤促服之不限五合宜小勞之漸進食不可令食少但勿便多耳鉛丹散治消渴止小便方鉛丹二分栝蔞十分澤瀉五分石膏五分赤石脂五分白石脂五分胡粉二分甘草十分凡八物冶下篩酒服方寸匕日三不知稍增年壯服半匕得病一年服藥一日愈二年二日瘥甚者夜以水服勿用酒治日飲一石許小便不通栝蔞丸方栝蔞三分鉛丹三分葛根三分附子一分炮凡四物冶下篩蜜丸如梧子飲服十丸日三治消渴方取活螺三斗以江水一石養之傾取冷汁飽飲之經日放去更取新者漬之夫內消之為病皆熱中所作也小便多於所飲令人虛極短氣內消者食物皆消作小便去而不渴也治之枸杞湯枸杞枝葉一斤冬根三兩栝蔞根三兩石膏三兩一方無黃連三兩甘草二兩凡五物切以水一斗煮取三升一服五合日三治小便多晝夜數十起方小豆生霍一把凡一物搗絞取汁頓飲三升便愈亦治小兒利消渴家忌食豬肉治虛勞諸方黃耆湯治虛勞胸中客熱冷癖痞滿宿食不消吐噫脅間水氣或流飲腸鳴不生肌肉頭痛上重下輕目視䀮䀮惚惚志損常躁熱臥不得安少腹急小便赤餘瀝臨事不起陰下濕或小便白濁傷多方黃耆三兩人參一兩芍藥二兩生薑半斤肉桂三兩大棗十四枚當歸一兩甘草一兩炙上八味切以水一斗煮取四升分四服有寒加厚朴二兩忌生蔥海藻菘菜增損腎瀝湯治腎氣不足消渴引飲小便過多腰背疼痛方腎一具豬羊並得遠志二兩麥門冬一升去心人參二兩五味子二合澤瀉二兩乾地黃二兩茯苓一兩桂心二兩當歸二兩芎藭二兩黃芩一兩芍藥一兩生薑三兩棗二十枚螵蛸二十枚炙雞膍胵里黃皮一兩上十七味以水一斗五升煮腎取一斗三升去腎煎藥取三升去滓分三服忌生蔥蕪荑酢物加減腎瀝湯治大虛內不足小便數噓吸焦熇引水漿膀胱引急方腎一具豬羊並可用遠志二兩去心麥門冬一升去心人參一兩大棗四十枚芎藭二兩五味子二兩當歸二兩澤瀉二兩桂心四兩乾薑二兩乾地黃三兩黃連二兩桑螵蛸二十枚龍骨二兩甘草三兩炙上十六味切以水一斗五升如常法煎取三升去滓分三服忌海藻菘菜生蔥豬肉蕪荑等物黃耆湯治虛勞少氣小便過多方黃耆二兩麥門冬二兩去心大棗三十枚擘芍藥二兩乾地黃二兩黃芩一兩桂心二兩生薑二兩當歸二兩甘草二兩炙上十味切以水九升煮取三升去滓分三服忌海藻菘菜生蔥蕪荑豬肉冷水治心虛驚悸羸瘦者方荊瀝二升火煎至一升六合分作四服日三夜一腎虛腰痛治之方牡丹二分去心萆薢三分白朮三分桂心三分上四味搗篩以酒服方寸匕日三亦可作湯服之忌生蔥胡荽桃李雀肉等治腰痛少氣陰弱寒冷小便清冷瀝滴陰下濕癢少腹急無子息方甘草十四分炙續斷三分麥門冬三分薯蕷三分附子三分炮乾薑二分棘刺四分上七味搗篩酒服方寸匕日三忌豬肉冷水海藻菘菜治腰痛皆積年痛者方乾地黃十分白朮五分乾漆五分桂心八分甘草五分炙上五味搗末以酒服方寸匕日三忌桃李雀肉生蔥海藻菘菜蕪荑等治卒腰痛不得俯仰方鹿角長六寸燒上一味搗篩為末以酒服方寸匕䐴腰疼方鱉甲一枚炙令黃刮削令淨潔上一味搗篩空腹以湯飲酒服方寸匕日三忌人莧菜治腰中常冷如帶錢方甘草乾薑各二兩茯苓術各四兩水五升煮取三升分溫為三服治夢泄諸失精衆方龍骨湯治夢失精諸脈浮動心悸少急隱處寒目眶疼頭髮脫者常七日許一劑至良方龍骨甘草炙各二分牡蠣三分熬桂心芍藥各四分大棗四枚擘生薑五分上七味切以水四升煮取一升半分再服虛羸浮熱汗出者除桂加白薇三分附子三分炮故曰二加龍骨湯忌海藻菘菜生蔥豬肉冷水薰草湯治夢失精方薰草人參乾地黃白朮芍藥各三兩茯神桂心甘草炙各二兩大棗十二枚擘上九味切以水八升煮取三升分為二服每服如人行四五里一方又有茯苓三兩忌桃李雀肉大酢海藻菘菜生蔥韭子湯治失精方韭子一升龍骨三兩赤石脂三兩凡三物以水七升煮取二升半分三服龍骨散治男子失精百術不治方龍骨大如指赤理錦紋者燻草二兩桂肉二兩乾薑二兩凡四物下篩酒服方寸匕日三神良治多汗方治大病後虛汗出不禁方粢粉豉凡二物分等火熬令焦燒故竹扇如掌大取灰合冶以絹囊盛敷體立止最驗當先熬豉末之與粉等也治大病之後虛汗不可止方杜仲牡蠣凡二物分等冶之向暮臥以水服五錢匕汗止者不可復服令人乾燥治發汗後遂漏汗不止其人惡風小便難四肢微急難以屈伸此為胃干也桂枝湯加附子主之方大棗十四枚擘桂枝三兩附子一枚碎之八片凡三物以水七升煮取三升分三服治百病後虛煩擾不得眠諸方流水湯主虛煩不得眠方半夏二兩洗十遍粳米一升茯苓四兩上三味切以東流水二斗揚之三千遍令勞煮藥取五升分服一升日三夜再忌羊肉餳醋物有半夏必須著生薑四兩不爾戟人咽不審古方何以如此今改正之大烏梅湯治被下之以後虛煩燥不得眠劇者顛倒心中懊憹方大烏梅十四枚擘好豉七合凡二物以水四升煮梅令得二升半納豉令四五沸得一升半分二服
