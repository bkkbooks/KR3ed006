body:
  text: 卷第九要方第九卷所治如下治服寒食散方治寒食散發動諸方治服傳病諸決待考上三件治服寒食散方服草木之藥則速發須調飲食金石者則遲起而難息其始得效者皆是草木盛也金石乃延引日月草木少時便息石勢猶自未盛其有病者不解消息便謂頓休續後更服或得病固藥微倍復增石或便雜服眾石非一也石之為性其精華之氣則合五行乃益五臟其濁穢便同灰土但病家血氣虛少不能宣通更陳瘀便成堅積若其精華氣不發則冷如冰而病者服之望石入腹即熱既見未熱服之彌多既見石不即效便謂不得其力至後發動之日都不自疑是石不肯作石消息便作異治者多致其害道弘道人制解散對治方說草石相對之和有的能發動為證世人逐易不逆思尋古今方說至於動散臨急便就服之即不救疾便成委禍大散由來早難將之藥夫以大散難將而未經服者乃前有慎耳既心期得益苟就服之已服之人便應研習救解之宜異日動之便得自救也夫身有五石之藥而門內無解救之人輕信對治新方逐易服之從非棄是不當枉命誤藥邪檢神農本草經說草石性味無對治之和無指的發動之說按其對治之和亦依本草之說耳且大散方說主患注藥物不說其所主治亦不說對和指的發動之性也覽皇甫士安撰解散說及將服消息節度亦無對和的發之說也復有稟丘家將溫法以救變敗之色亦無對和的動之說若以藥性相對為神者栝蔞惡乾薑此是對之大害者道弘說對治而不辨此道弘之方焉可從乎今不從也當從皇甫節度自更改栝蔞便為良矣患熱則不服其藥惟患冷者服之耳自可以除栝蔞若虛勞腳弱者以石斛十分代栝蔞若風冷上氣咳者當以紫苑十分代栝蔞二法極良若雜患常疾者止除栝蔞而已慎勿加余物治寒食散發動諸方論曰凡服五石散及鍾乳諸石丹藥等既瘥節度觸動多端發動雖殊將攝相似比來人遇其證專執而治之或取定古法則與本性有違或取決庸醫則昧於時候皆為自忤遂推石過深省其理未曰合宜每尋古醫互相晦見直言沐浴實未探微寒溫適情蓋須自度隨時之義易所通焉故陶正白雲昔有人服寒食散檢古法以冷水淋身滿二百罐登時韁斃又有取汗乃於狹室中四角安火須臾則殞據茲將息豈不由人追之昔事守株何甚今列篇章幸擇長而錄用耳寒食藥得節度者一月輒解或二十日解堪溫不堪寒即已解之候也其失節度者或頭痛欲裂為服藥食溫作癖宜急下之又若手腳卒患頑癖者為犯熱經久故也急與冷水洗飲熱清酒進冷食即止一法飲冷清酒亦止又若體上生瘡結氣腫痛不得動者為自勞太過也宜服香豉飲法香豉三升蔥白一虎口上二味以水三升煮三沸服之不止乃至三四劑自止又若腰痛欲折兩目欲脫者為熱上肝膈腰腎冷極故也宜服黃連飲法黃連甘草炙各一兩葳蕤二兩上三味切以水三升煮取一升去滓納朴硝一兩頓服得微利止又若眩冒欲倒者為衣厚犯熱故也宜冷水淋頭並洗之須臾即愈又若腳疼欲折者為久坐溫處故也宜常須單床行役並以冷水洗浴即止又若腹脹欲裂者為久坐下熱衣溫失食故也宜數冷食冷洗當風取冷須臾即瘥又心痛如刺者為應食不食應洗不洗寒熱相擊氣結不通填於心中故也宜數飲熱酒任性多少酒氣行經絡通達淋以冷水又冷淹手中搭著苦處溫復易之須臾解也解後仍速與冷食食多益善於諸痛之中心痛最急宜速救之又若發急遍身熱如湯火或氣結不識人時倒口噤不開不自覺知者救之要以熱酒隨其性灌之卒不得下者當打去齒灌之咽中寒盛酒入必還出但灌勿止半日許以酒下氣徹乃蘇酒卒不下者難可救矣又若下痢如寒中者為行止食飲犯熱所致宜速脫衣冷食冷飲冷水洗即瘥又若百節痠疼者為臥處太厚又蓋覆被衣溫不脫故也但單床薄被單衣或以冷水洗勿著新衣著故垢衣雖冬寒常須散發受風仍以冷石熨其衣勿繫帶若犯此酸悶者急入冷水浴勿忍病而畏冷兼食冷飯又若兢顫惡寒或發熱如溫瘧者為失食忍飢失洗不行又食臭穢故也宜急飽冷食冷水洗數行即愈又若惡食臭如死物氣者為食溫作癖故也宜急以三黃湯下之若不下終不瘥又若咽中痛鼻中塞清涕出者為衣溫近火故也但速脫衣取冷當風以冷石熨咽鼻當自瘥不須洗也又若胸脅滿氣上嘔逆者為飢而不食藥氣上衝故也速與冷水洗食冷飯止又若食便吐出不得安住者由癖故也宜急以甘草飲下之不下當危人命爾甘草飲法甘草二兩炙大黃三兩別漬黃芩二兩上三味切以水三升煮三兩沸去滓分服以利為度又若大便難腹中堅如盤蛇者為犯溫積久腹中有干糞不去故也宜銷酥蜜膏服一二升津潤腹內即下若不可服大黃朴硝等下之又若患淋者為久坐溫處或乘鞍馬坐處大熱熱入膀胱故也但冷食冷水洗冷石熨腹不過一日即瘥止又若寒慄頭掉不自支持者為食少藥氣溢於肌膚五臟失守百脈搖動與正氣相競故也宜強飲熱酒以和其脈強食冷食以定其臟強行以調其關節強洗以宣其擁滯即瘥又若小便稠數者為熱食及啖諸熱餅肉之屬故也宜冷水洗腹兼服梔子湯法梔子仁二兩甘草炙芒硝湯成下黃芩各二兩上四味切以水五升煮取二升分溫二服取利即瘥又若失氣不可禁止者為犯溫不時洗故也但冷水洗之即瘥又若遺糞不自覺者為熱氣入胃大腸不禁故也當冷洗即瘥又若目痛如刺者為熱氣衝肝上眼故也但數冷食清朝溫小便洗之不過三日即瘥止又若耳鳴如風聲又有汁出者為自勞過度陽事不節氣上耳故也宜數飲食補之節禁陽事即瘥又若口中傷爛舌強而燥不得食味者為食少穀氣不足藥氣積在胃管故也宜急作豉湯服之豉湯法香豉二升葳蕤甘草炙各二兩麥門冬去心小柏各三兩上五味切以水六升煮取二升分溫三服能頓服益佳再合為度又若關節強直不可屈伸可久停息不自勞泄藥氣不散漸侵筋血故也出力使溫冷洗即瘥止又若得傷寒溫瘧者為犯熱故也宜以常治藥救之無咎但勿服熱藥耳其傷寒瘧藥等皆除破癖不與寒食相妨故通服也凡服寒食雖已熱解而更病者要先以寒食救之終不中冷又若飲酒不解食不得下乍寒乍熱不洗便熱洗之復寒甚者數十日輕者數日晝夜不得寢寐愁悲恚怒自驚跳悸恍惚忘誤者為犯溫積久寢處失節食熱作藥內熱與藥並行寒熱交爭雖以法救之終不可解也昔皇甫氏曾餌此散每發即欲自刑尊親制之乃免斯禍強令飲食其熱漸除縱家有寒熱藥發急皆忘雖素聰明發皆頑冥告令難喻為茲斃者不可勝數遂檢家兄士元救急之法合三黃湯服之大下便瘥止而錄之又若脫衣便寒著衣便熱為脫著之間失適故也小寒自可著小溫便可脫即止洗則瞭然瘥矣應洗忽忌之忍則病成也又若齒齦腫唇爛牙齒搖痛頰車噤為坐犯熱故也宜時救之可當風張口使冷氣入咽漱寒水即瘥又若脈洪實或斷絕不足似死脈或細數弦快其所犯非一此脈無醫不識也熱多則弦快有癖則洪實急痛則斷絕凡寒食藥熱率常如此自無所苦非死唯勤節度為妙又若大便稠數為坐久失節度將死之候也如此難治矣可與前大黃黃芩梔子芒硝湯下之當十有一生耳可為必死之治不可不利致死令人恨也又若人已困而脈不絕為藥氣盛行於百脈人之真氣已盡藥氣尚自行故不絕非生氣也死後體因溫如生人肌腹中雷鳴顏色不變一兩宿乃作死人也又若周體患腫不能迴轉者為久坐不行又不飲酒藥氣滯在皮膚之內血脈不通故也宜飲酒冷水洗自勞即瘥若不能行者遣人扶持強行使肢節調暢乃止亦不得令過度使反發熱或反熱者還當洗之又若食患冷不可下者為久冷食口中不知味故也當作白酒糜多著蘇熱食一兩頓若小悶者還令冷飲食即瘥止又若下部臭爛者為坐薦席厚熱故也當坐冷水中即瘥又若夜眠不得睡者為食少熱在內故也服梔子湯方梔子仁十四個大黃三兩黃芩二兩上三味切以水五升煮取三升去滓分三服微利又當數進冷食自得眠睡又若嘔逆咽喉中傷清血出者為臥溫及食熱故也但飲冷水冷石熨咽喉即瘥又若藥發輒安臥不與人語者為熱盛食少失其性故也但與熱酒冷洗冷食自勞便瘥又若四肢面目浮腫者為飲食溫久不自勞力藥與正氣相隔故也但飲熱溫冷食自勞洗浴即瘥又若鼻中有氣如孵雞子臭者為著衣溫故也或陰囊臭爛為坐熱故也入冷水中即瘥宜脫衣洗浴即自瘥又若卒目暗無所見者為飲食居處太溫故也但脫衣冷洗冷身須臾瘥止又若身肉處痛痛無常處如遊風者為犯熱所作非風冷故也宜冷洗以冷石熨之自瘥又若服藥心悶亂者為服溫藥與疾爭力故也法當大吐如或不吐病當至死若吐不絕可食冷食飲自然瘥也若絕不識人口復不開者亦當斷齒以熱酒灌之入咽吐出者更與之但得酒氣下通不半日即便蘇矣又若嗜寐不覺者為久坐熱悶故也宜冷洗冷食即瘥又若肌膚堅如石不可屈伸為熱食溫臥作癖五臟隔閉血脈不通故也急服前三黃湯下之食冷食飲熱酒自勞即瘥又若臂腳偏急痛苦者為久坐臥溫熱不自移轉氣入肺脾胃故也宜勤以二布巾淹冷水搭之覺溫則易如此不過三日即瘥又若患腹背熱如手如杯如盤許大者以冷石隨處熨之又若腳指間生瘡者為履襪太溫故也當以腳踐冷地以冷水洗足瘥又若口熱痛煩悶者方生雞子五枚上一味頓服之即便愈或寒熱累月張口大呼眼視高精候不與人相當日用水百餘石澆洗不解者坐不能自勞又飲冷酒復食溫故也譬如暍人乃心下更寒以冷救之愈劇者氣結成冰得熱熨飲熱湯冰消氣散暍人乃心解令藥熱聚心乃更寒戰亦如暍之類也速與熱酒寒解氣通酒兩行於四肢周體悉溫然後以冷水三斗洗之𢣺然了也或有氣斷絕不知人時蹶口不可開病者不自知當須旁人救之要以熱酒為性命之本不得下者摝去齒以熱酒灌含之咽中塞逆酒入復還出者但與勿止也出復納之如此或半日灑下氣通乃蘇酒不下者便殺人也解寒食散發或頭痛或心痛或腹痛或胸脅腫滿或寒或熱或手足冷或口噤或口瘡爛或目赤或乾嘔惡食氣便嘔吐或狂言倒錯不與人相當或氣上欲絕進退經時散發百端服前胡湯得下便愈方前胡二兩芍藥三兩黃芩二兩大棗二十枚甘草二兩大黃二兩凡六物以水八升煮取二升半分三服心脅堅滿加茯苓二兩胸中滿塞急加枳子一兩連吐胸中冷不用食加生薑三兩虛乏口燥加麥門冬二兩若加藥者加水作九升也解散三黃湯治散盛熱實不除心腹滿小便赤大行不利圯逆沖胸中口焦燥目赤熏熱方黃連二兩黃芩二兩大黃一兩甘草二兩芒硝二兩凡五物以水五升煮取二升半納芒硝令烊分三服小三黃湯是由來舊方與前治同殺石勢勝前方除實不如也大黃一兩梔子十四枚黃芩二兩豉三升凡四物以水六升先煮三物令數沸以筥豉納湯中取二升分再服增損皇甫梔子豉湯治人虛石盛特折石勢除熱方豉一升半梔子十四枚黃芩二兩半凡三物以水六升煮取三升去滓納豉令得二升分三服解散熱發身如火燒黃芩湯方黃芩三兩甘草一兩枳實二兩厚朴一兩栝蔞一兩芍藥一兩梔子十四枚凡七物以水七升煮取二升半分三服解散除熱止煩殺毒單行薺苨湯方薺苨半斤凡一物以水一斗煮取三升分三服停冷飲之解散除熱單行凝水石湯方凝水石四兩凡一物以水四升煮取二升半服七合日三解散甘草湯治散發煩悶不解方甘草二兩黃芩二兩大黃二兩凡三物以水五升煮取二升分三服治口中乾燥渴嘔不下食方蘆根多少煮取濃汁以粟作粥漿服多少任意解散失節度口中發瘡方黃芩三兩升麻二兩石膏五兩末凡三物以水六升煮取三升去滓極冷以嗽口中日可十過若喉咽有瘡稍稍咽之佳治口瘡小柏湯方龍膽三兩黃連二兩小柏四兩凡三物以水四升先煮龍膽黃連取二升別漬小柏令水淹潛投湯中和稍含之治散發心痛腹脹兼冷動熱相格不消甘草湯方甘草二兩栝蔞二兩術二兩枳實二兩梔子仁二兩凡五物以水七升煮取二升分三服單行甘草湯方甘草四兩凡一物以水五升煮之折半冷之頓服盡當大吐患心腹痛服諸藥無效者宜服此湯解散二物麻子豉湯治人虛勞下焦有熱骨節疼煩肌急內圯小便不利大行數少吸吸口燥少氣折石熱方豉二升麻子五合擂取人凡二物研麻子仁以水四升煮取一升半分服五合日三便愈神驗治通身發瘡擘折經日用水不得息者方銼胡葈煮溫溫漬尤良冬取根煮飲之解散除熱熱結腫堅起始欲作癰升麻湯方升麻大黃芍藥枳實各二兩黃芩三兩甘草當歸各一兩凡七物以水八升煮取二升半分三服快下腫即消解散發振動煩悶嘔逆人參湯方法議道人所增損方用如此人參二兩甘草二兩術二兩黃芩一兩栝蔞二兩凡五物以水七升煮取二升分三服白薇湯治寒食藥發胸中澹酢乾嘔煩方白薇二兩半夏二兩洗乾薑一兩甘草半兩凡四物以酢五升煮取三升分服五合夫酢酒能令石朽爛治酒熱發熱法積飲酒石熱因盛數散行經絡中使氣力強腎家有熱欲為勞事勞事多使腎虛則熱盛熱盛心下滿口焦燥欲飲飲隨嘔吐不安飲食也宜飲葛根湯安穀神除熱止吐渴也解散閉悶結小便不通如淋方大黃一兩麻子仁半斤芍藥一兩茯苓二兩黃芩一兩凡五物以水五升煮取二升半分再服解散小便不通神良方桑螵蛸三十枚黃芩一兩凡二物以水一升煮取四合頓服之解散除熱小便數少單行葵子湯方亦治淋閉不通三歲葵子亦可用陳葵根切一升以水三升煮取二升暖如人肌稍服之解散除熱止利黃連湯方甘草一兩黃連二兩升麻一兩梔子十四枚豉五合凡五物以水五升煮取一升半分再服治散熱盛渴方生地黃一斤小麥二升竹葉切一升枸杞根一斤凡四物切以水一斗煮取九升渴者飲之呂萬舒解熱止渴飲地黃汁方生地黃一斤小麥三斤枸杞根二斤凡三物以水一斗煮取二斗汁渴者飲之單行枸杞白皮湯解散除熱止渴方枸杞根白皮十斤以水三斗煮取一斗分服一升薺苨湯華佗解藥毒或十歲或三十歲而發熱或燥燥如寒欲得食飲或不用飲食華佗散法有石硫黃熱鬱郁如熱澆洗失度錯服熱藥劇者擗裂礜石熱燥燥如戰紫石英勢悶暗喜臥起無氣力或時欲寒皆是府氣所生臟氣不和宜服此湯薺苨四兩甘草一兩人參一兩藍子一兩茯苓一兩芍藥一兩黃芩一兩芫菁子三升凡八物切以水一斗先煮蕪菁子得八升絞去滓煮藥得三升半分服七合日三若體寒倍人參減黃芩用半兩也若氣嗽倍茯苓減薺苨去一兩應楊卅所得吳解散單行蔥白湯方藥沉體中數年更發治之方生蔥白一斤凡一物以水八升煮取四升分服一升使一日盡之明日便當溫食飲於被中不後發便為知也不過三劑都愈也治散熱氣結滯經年不解數發者方胡葈葉半斤凡一物以水七升煮取二升半分作三服盡一劑便愈治服食傳病諸決待考
