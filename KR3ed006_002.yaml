body:
  text: 卷第二要方第二卷所治如下治頭面風論雜風狀諸方治喉痛喉痹諸方治暴厥似風諸方待考治中風喑癔不隨痛腫諸方治狂妄噤痙諸方治腳弱諸方上六件治頭面風論雜風狀諸方説曰風者四時五行之氣也分布八方順十二月終三百六十日各以時從其鄉來為正風在天地為五行在人為五臟之氣也萬物生成之所順非毒厲之氣也人當觸之過不勝其氣乃病之耳雖病然有自瘥者也加治則易愈其風非時至者則為毒風也不治則不能自瘥焉今則列其證如下春甲乙木東方清風傷之者為肝風入頭頸肝俞中為病多汗惡風喜怒兩脅痛惡血在內飲食不下肢節時腫顏色蒼泄嗌乾鼽衄夏丙丁火南方湯風傷之者為心風入胸脅腑臟心俞中為病多汗惡風憔悴喜悲顏色赤洞泄清穀仲夏戊己土同南方湯風傷之者為脾風入背脊脾俞中為病多汗惡風肌肉痛身體怠惰四去不欲動不嗜食顏色黃喜因人虛實之變陽氣有餘陰氣不足者則內外生熱在中者令人喜飢若陽氣不足陰氣有餘者則內如有寒從中出腸鳴而痛秋庚辛金西方涼風傷之者為肺風入肩背肺俞中為病多汗惡風寒熱咳動肩背顏色白霈然病瘧晝瘥夕甚冬壬癸水北方寒風傷之者為腎風入腰股四肢腎俞中為病多汗惡風腰脊骨肩背頸項痛不能久立便出曲難不利陰痹按之不得小便腹脹面龐然有澤腫時眩顏色黑令人厥上四時正氣之風平人當觸之過得病證候如此四時風總名春九十日清風夏九十日湯風秋九十日涼風冬九十日寒風其氣分布八方亦各異名也太一之神隨節居其鄉各四十五日風雲皆應之今列其風名如下東北方艮之氣立春王為條風一名凶風王四十五日東方震之氣春分王為明庶風一名嬰兒風王四十五日東南方巽之氣立夏王為清明風一名弱風王四十五日南方離之氣夏至王為景風一名大弱風王二十七日合仲夏也仲夏中央之氣主立八方之氣戊己王十八日合夏至合四十五日風名同西南方坤之氣立秋王為涼風一名謀風王四十五日西方兌之氣秋分王為閶闔風一名剛風王四十五日西北方乾之氣立冬王為不周之風一名折風王四十五日北方坎之氣冬至王為廣莫風一名大剛風王四十五日上八方之風各從其鄉來主長養萬物人民少死病也八方風不從其鄉來而從沖後來者為虛邪賊害萬物則人民多死病也故聖人説避邪如避矢也邪者風也今人壽夭多病是不知避邪也為病證候如下凶風之氣內舍大腸中外在脅腋骨下四肢節解中書本遺其病證今無也嬰兒風為病令人筋紉濕其氣內舍肝中外在筋中弱風為病令人體重其氣內舍胃中外在肉中大弱風為病令人發熱其氣內舍心中外在脈中謀風為病令人弱四肢緩弱也其氣內舍脾中外在肌中剛風為病令人燥燥者枯燥瘦瘠也其氣內舍肺中外在皮中折風為病則因人脈絶時而泄利脈閉時則結不通喜暴死也其氣內舍小腸中外在右手太陽中大剛風為病令人寒寒者患冷不能自溫也其氣內舍腎中外在骨中脊膂筋中也上八風從其沖後來者為病如此新食竟取風為胃風其狀惡風頸多汗膈下塞不通食飲不下脹滿形瘦腹大失衣則填滿食寒則洞泄因醉起風為漏風其狀惡風多汗少氣口乾渴近衣則身熱如火燒臨食則汗流如雨骨節解惰不欲自營新沐浴竟取風為首風其狀惡風面多汗頭痛新房室竟取風為泄風其狀惡風汗流沾衣勞風之為病喜在肺使人強上惡風寒戰目脫涕唾出候之三日中及五日中不精明者是也七八日則微有清黃膿涕如彈丸大從口鼻中出為善也若不出則傷肺風者其氣喜行而數變在人肌膚中內不得泄外不得散因人動靜乃變其性其證如下有風遇寒則食不下遇熱則肌肉消寒熱有風遇陽盛則不得汗遇陰盛則汗自出肥人有風肌肉厚則難泄喜為熱中目黃瘦人有風肌肉薄則恆外行身中寒目淚出有風遇實則腠理閉則內伏令人熱悶若因熱食汗欲通腠理得開其風自出則覺肉中如針刺步行運力欲汗亦如此有風遇虛腠理開則外出悽然如寒狀覺身中有如水淋時如竹管吹處治口眼相引喎僻者方以生鱉血塗之以桑鉤鉤吻邊挂著耳也血乾復塗之用白酒勝血眼眶動口唇動偏喎皆風入脈故也急服小續命湯摩神明膏治喉痛喉痹諸方治喉痹卒不得語方濃煮桂汁服一升覆取汗亦可末桂著舌下大良又方取炊甑蓽燒作屑三指撮少水服之即效又方濃煮大豆汁含之無豆煮豉亦良治喉痹者喉里腫塞痹痛水漿不下入七八日即殺人治之方熬杏仁熟搗蜜丸如彈子含咽其汁亦可搗杏仁末帛裹含之治喉中卒毒攻痛方章陸根切炙令熱隔布尉之冷轉易立愈苦酒熱熬敷喉亦療喉痹治喉諸病方雞子一枚破以黃白攪吞之瘥治暴厥似風諸方待考治中風喑癔不隨痛腫諸方小續命湯治卒中風欲死身體緩急口目不正舌強不能語奄奄惚惚精神悶亂諸風服之皆驗不令人虛方甘草一兩麻黃一兩防風一兩半防己一兩人參一兩黃芩一兩桂心一兩附子一枚大者炮芎藭一兩芍藥一兩生薑五兩上十一物以水九升煮取三升分三服甚良不瘥更服三四劑必佳取汗隨人風輕重虛實也有人腳弱服此方至六七劑得瘥有風疹家天陰節變輒合之可以防喑癔也羌活湯治中柔風身體疼痛四肢緩弱欲作不隨方羌活三兩桂肉三兩生薑六兩乾地黃三兩葛根三兩芍藥三兩麻黃二兩去節甘草二兩凡八物以清酒三升水五升煮取三升酒服五合日三治中風不語方獨活一兩酒二升煎一升大豆五合炒有聲以藥酒熱投蓋之良久酒服三合未瘥再服治狂妄噤痙諸方遠志湯治中風心氣不定驚悸言語謬誤恍恍惚惚心中煩悶耳鳴方遠志三兩去心茯苓二兩獨活四兩甘草二兩芍藥三兩當歸二兩桂肉三兩麥門冬三兩半去心生薑五兩人參二兩附子一兩炮黃耆三兩凡十二物以水一斗二升煮取四升服八合人羸可服五合日三夜一張仲景三黃湯治中風手足拘攣百節疼煩發作心亂惡寒引日不欲飲食祕方麻黃五分去節獨活五分細辛一分黃耆二分黃芩三分凡五物以水五升煮取二升分再服一服即小汗出兩服大汗出即愈治卒發狂方用其人著地以冷水淋其面終日淋之治腳弱諸方風毒中人多不即覺或因衆病乃覺也其狀或有見食嘔吐憎聞食臭或有腹內痛兼下或胸中衝悸不欲見光明或精神昏憒或喜妄語錯亂或壯熱頭痛或身酷冷悁疼或喜舉體轉筋或兩腳微腫或直痹或膝至腳不仁時緩縱不隨此皆腳病之證也治轉筋方以白醋煮粉令一沸因以洗足腓至足立愈脈浮大者病在表沉細者病在裡其脈浮大緊駛者三品之中最惡脈也腳氣脈三種以緩脈為輕沉緊為次洪數者為下
