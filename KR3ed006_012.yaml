body:
  text: 卷第十二灸法要穴經說夫病以湯藥救其內針灸營其外夫針術須師乃行其灸則凡人便施為師解經者針灸隨手而行非師所解文者但依圖詳文則可灸野間無圖不解文者但遂病所在便灸之皆良法但避其面目四肢顯露處以瘡瘢為害耳黃帝曰灸不三分是謂徒啞解曰此為作炷欲令根下廣三分為適也減此為不覆孔穴上不中經脈火氣則不能遠達今江東及嶺南地氣濕溫風寒少當以二分以還極一分半也遂人形闊狹耳嬰兒以意作炷也凡八木之火皆害人肌血盤脈骨髓不可以灸也大上用陽燧之火其次䃈石之火天陰以槐木之火為良也陽遂是火珠耀日取火也天陰無日時則鑽槐木取火也今世但令避此八木之火耳當用人間相傳之火也以摩膏布纏延之以艾莖延之皆良也相傳之火者皆非臨時鑽截所得也皆衆薪雜木延之已變以木勢厲不復為害是可用也蝦蟆經云松木之火以灸即根難愈柏木之火以灸即多汁竹木之火以灸即傷筋多壯肉傷橘木之火以灸即傷皮肌榆木之火以灸即傷骨多壯即骨枯枳木之火以灸即陷脈多壯即脈淳桑木之火以灸即傷肉棗木之火灸即傷髓多壯即髓消黃帝經曰禁不可灸者有十八處而明堂說便不禁之今別記之如下頭維禁不可灸承光禁不可灸腦戶禁不可灸風府禁不可灸瘖門禁不可灸耳門耳中有膿及適抵無灸人迎禁不可灸絲竹空灸之不幸使人目小及盲承泣禁不可灸脊中禁不可灸乳中禁不可灸石門女子禁不可灸氣街灸之不幸不得息淵腋灸之不幸生腫蝕天府禁不可灸經渠禁不可灸地五會禁不可灸伏兔禁不可灸曹氏說不可灸者如下玉枕者人音聲之所經從無病不可灸灸則聲不能語若有疾可灸五十壯維角者在眼後髮際上至角脈上是也人眼精之所心通神為明者也不可妄灸灸則令失明此則頭維也精明者名為郎井在眼本眥隱中可容豆者人眼神光之所歸息也無病不可灸灸則失明反赤有病可灸七壯至十四壯舌根在頤下廉泉之後當結喉上仰著下頤當舌根下去結喉一寸長人可一寸半咽吞口味時按之有怒肉起是也人聲息之亭候無病不可灸灸則令氣澀語不轉有病可灸七壯至十四壯結喉在頸下陰喉頭突起腂腂者也人五臟榮衛之所統也無病不可灸灸則妖鳴語不成音有疾可灸七壯胡脈在頸本邊主乳中脈上是也一名榮聽人五臟血氣之注處也無病不可多灸灸熟則血氣決泄不可止有疾可灸五十壯天突者名為天瞿復名身道是體精之衢路也無病不可灸灸則傷聲反喑有疾可灸五十壯神府者人神之明堂也無病不可灸灸則少氣之短使人無精守有疾可灸百壯此則鳩尾一名龍頭是也臣攬者名為神精人筋脈之所交也不可妄灸灸則令人不能舉臂有疾可灸百壯關元者下焦陰陽宗氣之奧室也婦人無疾不可妄灸灸則斷兒息有疾可灸百壯血海者名為沖使在膝內骨上一夫陷中人陰陽氣之所由從也無病不可灸灸男則陽氣衰女則絶産不欲動搖肢節也有疾可灸五十壯足太陰者人陽精之房沖也無病不可灸灸男則陽氣衰女則令絶産有疾可灸五十壯丘墟者名為蹄溪在外踝下少耶近前是也人聲室之房源無病不可灸灸則氣下不能上通令喑不能言有疾可灸十四壯上二十穴曹氏說云無病不可灸灸則為害也尋不病者則不應徒然而灸以痛苦為玩者也皆病至不獲已灸耳便是未詳曹氏此說也師述曰孔穴去病有近遠也頭病即灸頭穴四肢病即灸四肢穴心腹背脅亦然是以病其處即灸其穴故言有病者可灸此為近道法也遠道針灸法頭病皆灸手臂穴心腹病皆灸脛足穴左病乃灸右右病皆灸左非其處病而灸其穴故言無病不可灸也非其身都無病而徒灸者也故言其穴所在之處無病不橫為遠道穴灸苟犯其禁耳意為如此幸可更詳也腹背宜灸五百壯四肢則但去風邪不宜多灸七壯至七七壯止不得過隨年數如巨闕鳩尾雖是胸腹之穴灸不過七七壯艾炷不須大以竹箸頭作炷正當脈上灸之若灸胸腹艾炷大灸多令人永無心力如頭頂穴若灸多令人失精神臂腳穴灸多令人血脈枯竭四肢細瘦無力既復失精神又加於細瘦即脫人真氣膝目四穴膝內外目一膝有二穴各有犢鼻兩旁陷者中如猴猻眼者是也曲尺二穴在一腳趺上脛之下接腕曲屈處對大指歧當踝前兩筋中央陷中是也風府一穴在項後髮際下小入發中當兩盤中央陷中是也大椎上節以上屬頸崇骨也大椎與崇骨相接處其節最高大也巨闕在龍頭骨下一寸是也灸心痛方心懊憹徹痛煩逆灸心俞百壯心痛如刀刺氣結灸鬲俞七壯心痛胸痹灸膻中百壯心痛冷氣上灸龍頭百壯在心鳩尾頭上行一寸半心痛惡氣上脅急痛灸通谷五十壯乳下二寸心痛暴絞急絶欲死灸神府百壯附心鳩尾正心有忌心痛暴惡風灸巨闕百壯心痛胸脅滿灸期門隨年壯心痛堅煩氣結灸大倉百壯大便閉塞氣結心滿方灸石關百壯又方灸足大都隨年壯治啘方灸腋下聚毛中五十壯又方灸石關穴五十壯泄利食不消不作肌膚灸脾俞隨年壯泄注便膿血五色重下灸小腸俞百壯泄利不禁少腹絞痛灸丹田穴百壯在臍下二寸灸咳嗽法灸肩井穴百壯在肩上陷解中大骨前又方灸大杼穴隨年壯在項第一椎下兩旁各一寸半陷者中又方灸肺俞隨年壯在第三椎下兩旁各一寸半又方灸風門熱府穴百壯在第二椎下兩旁各一寸半又方灸天突穴五十壯在結喉下五寸宛宛中又方灸玉堂穴百壯在紫宮下一寸六分又方灸膻中穴五十壯在玉堂下一寸六分兩乳間陷者中又方灸雲門穴五十壯在巨骨下氣戶兩旁各二寸陷者中橫去旋機旁六寸又方灸中府穴五十壯肺募也在雲門下一寸又方灸巨闕穴五十壯在鳩尾穴下五分又方灸期門穴五十壯在去巨闕五分舉臂取之又方灸俞府穴在旋機旁各二寸又方灸或中穴在輸府下一寸六分又方灸氣戶穴在去旋機旁各四寸灸水病法灸膈俞百壯三報在第七椎下兩旁一寸半又方灸脾俞百壯在十一椎下兩旁一寸半又方灸意舍百壯在當臍孔中央是也眼瞤動口唇動偏喎皆風入脈故也灸吻邊橫紋赤白際逐左右風乘不收處灸隨年壯日日報之三報且息三日不效復三報之灸喑不能言方天聰在亞會後一寸半前項穴也天窗在前項前一寸半亞會一名也百合卒狂言鬼語方以甑帶急合縛兩手父指便灸左右脅下對屈肘頭兩火俱起灸七壯須臾鬼語自云姓名乞得去徐徐詰問乃解其手也狂罵詈擲打人方灸口兩吻邊燕丸處赤白際各一壯並灸背胛間名臣攬三壯三日一報之又方灸陰囊下縫三十壯女人者灸陰會也灸癲病狂病方陰莖上宛宛中三壯大指上叢毛中七壯或九壯足小指本節前七壯囊下縫上二七壯背脈在直鼻中上灸三十壯三報脊窮下尻骨頭灸消渴法灸關元一處又挾兩旁各二寸二處各灸三十壯五日一報至百五十壯灸腰痛法令病人正踦立以竹杖柱地度至臍以度注地背正灸脊骨上隨年壯灸竟藏竹勿令人得之灸丈夫痔下血及脫肛不入及息下長泄利婦人女子月崩去血乍止乍發及滯下淋瀝長去赤白雜汁皆灸此又挾兩旁各一寸復灸之為橫三穴間一寸也又灸腰目小耶在尻上左右陷處是也治霍亂嘔噦吐逆良久不止方灸巨闕並太倉各五十壯起死吐且下利者灸兩乳連黑外近腹白肉際各七壯亦可至二七壯若吐止而利不止者灸臍一夫納中七壯又云臍下一寸二七壯若煩悶湊滿者灸心厭下三寸七壯名胃管又方以鹽納臍中上灸二七壯若繞臍痛急者灸臍下三寸三七壯名關元良灸黃疸法灸脾俞百壯穴在第十一椎下兩旁一寸半又方灸手太陰隨年壯穴在手小指端又方灸錢孔百壯穴度乳至齊中屈肋頭骨是又方灸胃管百壯穴在鳩尾齊中病石淋齊下三十六種病不得小便方灸關元三十壯又方灸大敦三十壯在足大指端去爪甲如韭葉又方灸氣門三十壯治淋病不得小便陰上絞痛方灸足太衝五十壯在足太指本節後二寸又方灸懸泉一名中封十四壯中封在足內踝前一寸治小便不通方以鹽滿齊灸上三壯治遺尿灸穴灸遺道在挾玉泉五分隨年壯又方灸陽陵泉陰陵泉隨年壯在膝下一寸治耳聾方灸聽會穴在耳前陷中男頽有腸頽卵脹有水頽氣頽四種腸頽卵脹難瘥氣頽水頽針灸則易瘥也男陰卵偏大頽方灸肩井並灸關元百壯又方灸玉泉百壯在關元下一寸又方灸足太陽五十壯並灸足太陰五十壯有驗頽病陰卒腫者方合併足縛兩大趾令爪相併以艾丸灸兩爪端方角處一丸令頓在兩爪角上也令丸半上爪上佳灸七壯愈治猘犬咬人方先嗍去惡血乃須灸瘡中十壯明日以去日灸一壯滿百日乃止忌酒治猘狗齧人方嗽去其惡血灸其處百壯以後當日灸百壯血不出者小刺傷之灸百壯乃止
