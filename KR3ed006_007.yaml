body:
  text: 卷第七要方第七卷所治如下治女子衆病諸方治婦人無兒諸方待考治妊胎諸方治産後諸方治嫗人諸血崩滯下宿疾諸方上五件治女子衆病諸方古時婦人病易治者嫁晚腎氣立少病不甚有傷故也今時嫁早腎根未立而産傷腎故也是以今世少婦有病必難治也早嫁早經産雖無病者亦夭也婦人長血諸方説三十六疾者十二症九痛七害五傷三痼不通是也何謂十二症是所下之物一曰狀如膏二曰如黑血三曰如紫汁四曰如赤肉五曰如膿痂六曰如豆汁七曰如葵羹八曰如凝血九曰如清血血似水十曰如米泔十一曰如月浣乍前乍卻十二曰經度不應期也何謂九痛一曰陰中痛傷二曰陰中淋瀝痛三曰小便即痛四曰寒冷痛五曰經來即腹中痛六曰氣滿痛七曰汁出陰中如有蟲齧痛八曰脅下分痛九曰腰胯痛何謂七害一曰窮孔痛不利二曰中寒熱痛三曰小腹急堅痛四曰藏不仁五曰子門不端引背痛六曰月浣乍多乍少七曰害吐何謂五傷一曰兩脅支滿痛二曰心痛引脅三曰氣結不通四曰邪思淺利五曰前後痼寒何謂三痼一曰羸瘦不生肌膚二曰絶産乳三曰經水閉塞白堊丸主婦人三十六疾病各異同治之方白堊三分龍骨三分芍藥二分黃連三分當歸二分茯苓三分黃芩二分瞿麥二分白蘞二分石葦二分甘草二分牡蠣二分細辛二分附子二分禹餘糧二分白石脂二分人參二分烏賊骨二分桂心四分白芷四分大黃二分二十一味下篩蜜丸如梧子未食服十丸日二不知稍增服藥二十日知三十日百病悉愈治婦人無兒諸方待考治妊胎諸方凡婦人虛羸血氣不足腎氣少弱或當風取冷太過心下有淡水者欲有胎便喜病阻何謂欲有胎其人月水尚來顏色肌膚如常而沉重憒悶不用飲食不知其患所在脈理順時平和則是欲有胎也如此經二月日後便常不通即結胎也阻病者患心中憒憒頭重眼眩四肢沉重懈墮不欲執作惡聞食氣欲啖鹹酸果實多臥少起世謂惡食其至三四月日已上皆大劇吐逆不能自勝舉也此由經血既閉水漬於臟臟氣不宣通故心煩憒悶氣逆而嘔吐也血脈不通經絡否澀則四肢沉重挾風則頭目眩也覺如此候者便宜服半夏茯苓湯數劑後將茯苓丸淡水消除便欲食也既得食力體強氣盛力足養胎母便健矣古今治阻病方有數十首不問虛實冷熱長少殆死者活於此方半夏茯苓湯治妊身阻病心中憒悶空煩吐逆惡聞食氣頭重四肢百節疼煩沉重多臥少起惡寒汗出疲極黃瘦方半夏五兩生薑五兩茯苓三兩旋覆花一兩橘皮二兩細辛二兩芎藭二兩人參二兩芍藥二兩乾地黃三兩澤瀉二兩甘草二兩凡十二物以水一斗煮取三升分三服若病阻積日月不得治及服藥冷熱失候病變客熱煩渴口生瘡者除橘皮細辛用前胡知母各二兩若變冷下者除乾地黃用桂肉二兩若食少胃中虛生熱大行閉寒小行赤少者宜加大黃三兩除地黃加黃芩一兩余藥依方服一劑得下後消息者氣力冷熱更增損方調定即服一劑湯便急將茯苓丸令得能食便強健也茯苓丸治妊身阻病患心中煩悶頭重眩目憎聞飯氣便嘔逆吐悶顛倒四肢委熱不自勝持服之即效要先服半夏茯苓湯兩劑後將茯苓丸也茯苓一兩人參二兩桂肉二兩乾薑二兩半夏二兩橘皮一兩白朮二兩枳實二兩葛根屑一兩甘草二兩凡十物搗篩蜜和丸如梧子飲服二十丸漸至三十丸日三治妊娠五月日舉動驚愕動胎不安下在小腹痛引腰胳小便疼下血安胎當歸湯方當歸阿膠炙芎藭人參各一兩大棗十二枚擘艾一虎口上六味切以酒水各三升合煮取三升去滓納膠令煬分三服腹中當小便緩瘥也治妊娠重下痛引腰背安胎止痛湯方當歸膠炙乾地黃黃連芍藥各一兩雞子一枚秫米一升上七味切以水七升攪雞子令相得煮秫米令如蟹目沸去滓納諸藥煮取三升分四服忌蕪荑膠艾湯治損動母去血腹痛方膠一斤炙艾葉一莒上二味以水五升煮取二升半分三服安胎寄生湯治流下方桑上寄生五分白朮五分茯苓四分甘草十分炙上四味切以水五升煮取二升半分三服若人壯者可加芍藥八分足水二升若胎不安腹痛端然有所見加乾薑四分即安忌海藻菘菜酢物桃李雀肉等苧根湯治勞損動胎腹痛去血胎動向下方苧根乾地黃各二兩當歸芍藥阿膠炙甘草炙各一兩上六味切以水六升煮取二升去滓納膠煬分三服忌海藻菘菜蕪荑治妊娠數月日猶經水時時來者名曰漏胞苦因房室勞有所去名曰傷胎視説要知如此小豆散治數傷胎將用之方赤小豆五升濕地種之令生牙干之上一物下篩懷身數月日經水尚來以溫酒服方寸匕日三得效便停治妊身腹中冷胎不安方甘草當歸各二兩乾薑三兩大棗十二枚凡四物以水五升煮取三升分三服治母有勞熱動胎胎不安去血手足煩方生甘竹皮二升當歸二兩芎藭一兩黃芩半兩凡四物以水一斗煮竹皮取六升汁去滓納煎取三升分三服治妊身心腹刺痛方鹽燒令赤熟三指撮酒服之立瘥又方燒棗十四枚冶末以小便服之立愈治妊身腰痛如折方大豆三升以酒三升煎取二升服之治妊娠患子淋宜下地膚大黃湯地膚草大黃各三兩知母黃芩茯苓一作豬苓芍藥枳實炙升麻通草甘草炙各二兩上十味切以水八升煮取三升分三服得下後淋不好瘥還飲地膚葵根汁忌海藻菘菜酢物又方豬苓五兩上一味搗篩以白湯三合和一方寸匕為一服漸至二匕日三夜二盡不差宜轉下之服甘遂散治妊娠子淋大小便並不利氣急已服豬苓散不瘥宜服甘遂散下之方太山赤皮甘遂二兩上一味搗篩以白蜜二合和服如大豆粒多覺心下煩得微下者日一服之下後還將豬苓散不得下日再服漸加可至半錢匕以微下為度中間將豬苓散黃柏寄生湯在治子淋方中治妊娠患子淋小便數出少或熱痛痠疼及足煩地膚飲方地膚草三兩以水四升煮取二升半分三服日三日一劑治妊娠忽悶眼不識人須臾醒醒復發亦仍不醒者名為痓病亦號子癇病亦號子冒葛根湯若有竹近可速辦者當先作瀝汁後辦湯也其竹遠不可即辦者當先辦湯此二治會得其一種其竹瀝偏治諸痙絶起死也非但偏治妊娠産婦絶死者有效小兒忽癇痙金瘡治之亦驗作竹瀝法取新伐青淡竹斷之除兩頭節留中央一節作片以磚並側令竹兩頭虛布列其上燒中央兩頭汁出以器承之取服主痙至冒葛根湯治妊娠臨月因發風痙忽悶憒不識人吐逆眩倒小醒復發名為子癇病方貝母葛根牡丹去心木防己防風當歸芎藭桂肉切熬茯苓澤瀉甘草炙各二兩獨活石膏碎人參各三兩上十四味切以水九升煮取三升分二服貝母令人易産若未臨月者升麻代之忌海藻菘菜酢物治妊娠得病事須去胎方麥蘖一升末和煮二升服之即下神效又方七月七日法曲三升煮兩沸宿不食旦頓服即下治羸人欲去胎方甘草炙乾薑人參芎藭生薑桂心蟹爪黃芩各一兩上八味切以水七升煮取二升分三服忌海藻菘菜生蔥婦人得溫病欲去腹中胎方取雞子一枚扣之以三指撮鹽量雞子中服之立出又方取井底泥手書其腹立出神良治妊婦日月未至欲産方搗知母和蜜為丸如梧子服一丸痛不止更服一丸治妊身欲去之並斷産方栝蔞桂心各三兩豉一升上三味切以水四升煮取一升半分服之又方附子二枚搗為屑以淳苦酒和塗之右足去之大良斷産方故布方圓一尺燒屑以酒飲服之終身不産治月未足胎死不出母欲死方大豆醋煮服三升死兒立出分二服之又方桃白皮如梧子大服一丸立出又方好書墨三寸末頓服又方鹽一升雞子二枚和頓服之又方瞿麥一把煮令二三沸飲其汁立産一方下篩服方寸匕治子死腹中方服水銀二兩立出又方搗芎藭酒服方寸匕神良又方蟻室土三升熬令熱袋盛㩉心下胎即下又方灶中黃土三指撮酒服之立出治母子俱死者産難及胎不動轉者方榆白皮三兩葵子五合甘草炙桂心各一兩上四味切以水四升煮取二升服一升須臾不産更服一升忌海藻菘菜生蔥治産難歷日氣力乏盡不能得生此是宿有病方赤小豆二升膠二兩上二味以水九升煮豆令熟取汁納膠令煬一服五合不覺不過再即産又方取馬銜一枚覺痛即令左手持之又方取槐東引枝手把之又方手捉鸕鷀頭甚驗治難産三日不出者方吞皂莢子二枚亦效治産難數日欲絶祕方書奏作兩行字凡二十字文曰帝乙生子司命勿止即出其胞及其子無病其母封其中央以朱印之令産婦持之治産難方取其父衣以覆井即出神良又方小麥二七枚吞之即出又方出蠶種布三寸燒作散酒服方寸匕立出又方蘇一合以酒和服即出又方燒兔毛末服方寸匕即生又方燒大刀環令熱以酒沃之取一升服之救死又方陳葵子三指撮酒服治橫産及側或手足先出方可持粗針針兒手足入二分許兒得痛驚轉即縮自當回順治橫生方栝蔞實中子一枚削去尖者以水漿吞之立産治逆産方鹽塗兒足底又可急搔爪之並以鹽摩産婦腹上即愈又方鹽和粉塗兒兩足下即順矣又方以彈丸二枚搗末三指撮溫酒服又方取車釭中膏畫腋下及掌心治逆産方燒兒父手足十指爪甲冶末服之又方取生艾半斤清酒四升煮取一升頓服之則順生若不飲酒用水子上迫心方取弩弦縛心下即出預服散令易生母無疾病未生一月日前預服過三十日行步動作如故兒生墮地皆不自覺甘草散方甘草八分炙黃芩大豆卷粳米麻子仁乾薑桂心各二分吳茱萸二分上八味搗散酒服方寸匕日三忌海藻菘菜生蔥治婦人易生産飛生丸方飛生一枚槐子故弩箭羽各十四枚上三味搗末蜜丸桐子大覺便以酒服二丸即易産又方取蛇蛻皮著衣帶中鑑鼻系衣帶臨欲産時左手持馬銜右手持飛生毛令易産令易産方燒藥杵令赤納酒中飲之産婦易産方馬銜一枚覺痛時右手持之又方蛇脫皮頭尾完具者一枚覺痛時以絹囊盛繞腰甚良治胞衣不出方取皂莢搗末著鼻孔中嚏即出又方鹿角末三指撮酒服之又方取夫單衣蓋井上立出又方兒衣不出吞此符吉治胞衣不出方井中土如梧子大吞之治胞衣不出方以水煮弓弦飲之一升許治胞衣不出並兒橫倒死腹中母氣欲絶方半夏二兩洗白蘞二兩上二味搗篩服方寸匕小難一服橫生二服倒生三服兒死四服亦可加代赭瞿麥各二兩又方小豆小麥相和濃煮汁飲之立出治産後諸方夫死生皆有三日也古時婦人産下地坐草法如就死也即得生産謂之免難也親屬將豬肝來慶之以豬肝補養五日內傷絶也非慶其兒也婦人産後滿月者以其産生身經暗穢血露未淨不可出戶牖至井灶所也亦不朝神祗及祠祀也滿月者非為數滿三十日是跨月故也若是正月産跨二月入三月是跨月耳婦人産時骨分開解是以子路開張兒乃得出耳滿百日乃得完合平復也婦人不自知唯滿月便云是平復合會陰陽動傷百脈則為五勞七傷之疾治産後而乳無汁者下乳散方最驗鍾乳五分通草五分漏蘆二分桂心二分栝蔞一分甘草一分凡六物搗篩飲服方寸匕日三又方石膏三兩以水三升煮三沸一日飲令盡良産後虛羸令人肥白健壯羊脂二斤生地黃汁一斗薑汁五升白蜜三升煎如飴溫酒服一杯日三治産後漏血不息方蜂房故𣕕船竹茹凡二物分等皆燒末以酪及漿服方寸匕日三治産後小便不禁方取雞子燒作灰酒服日三治産後遺尿不知出方白薇芍藥各一分上二味搗散以酒服方寸匕日三治産後遺尿不知出時方取胡燕巢中草燒末服半錢匕水酒無在亦治男子又方取礬石牡蠣分等下篩酒服方寸匕日三治産後小便數方取衣書中白魚蟲三十枚末之以綿裹納陰中良治産後陰脫方以鐵精敷上多少令調以火炙布令暖尉肛上漸納之又方用鱉血燒地令熱血著上使病人坐之良治産後中風冷成腫欲死方取鼠壤四升熬令熱以囊貯著腹上亦著陰上下使熱氣入腹中良大豆紫湯主婦人産後中風困篤或背強口噤或但煩熱苦渴或頭身皆重或身癢劇者嘔逆直視此皆因風冷濕所為方大豆三升炒令炮斷預取器盛清酒五升沃熱豆中訖漉去豆得余汁盡服之溫覆取微汗出身體才潤則愈一以去風二則消血結云周德成妻妊胎因觸傷胎死在腹中三日困篤服此酒即瘥後治無不佳治産後中寒風痙通身冷直口噤不知人方白朮四兩酒三升煮取一升去滓頓服忌桃李雀肉等治産後中風虛人不可服它藥者一物若獨活湯主之及一物白蘚湯主之亦可與獨活合煮之方獨活三兩以水三升煮取一升分服奈酒者亦可酒水等煮之用白蘚皮亦依此法治産後風虛方獨活白蘚皮各三兩水三升煮三升分三服耐酒者入酒同煮治産後中風語澀四肢拘急方羌活三兩為末每服五錢水酒各半盞煎去滓溫服治産後忽痙口噤面青手足強及張者方與竹瀝汁一升即醒中風者尤佳治産後中柔風舉體疼痛自汗出者及余百疾方獨活八兩當歸四兩上二味㕮咀以酒八升煮取四升去滓分四服日三夜一取微汗若上氣者加桂心二兩不瘥更作治嫗人諸血崩滯下宿疾諸方治婦人崩中晝夜十數行醫所不能治方芎藭八兩上一味切以酒五升煮取三升分三服不飲酒水煮亦得治崩中去血方舂生薊根汁一升溫頓服之亦可以酒煮隨意服之又方舂地黃汁一升溫頓服之即止治婦人暴崩中去血不息方牡蠣熬令赤兔骨炙各十分上二味搗篩為散以酒服方寸匕妙治婦人五崩下赤白青黃黑大棗湯方大棗百枚黃耆三兩膠八兩甘草一尺凡四物以水一斗煮取三升半納膠令煬分三服治漏下神方取槐耳燒搗下篩酒服方寸匕日三立愈治婦人漏下病不斷積年困篤方取鵲重巢柴合燒末服方寸匕日三鵲重巢者去年在巢中産今歲更在其上覆作巢是也
